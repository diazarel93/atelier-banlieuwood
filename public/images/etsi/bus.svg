<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="morningSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0b8d0"/>
      <stop offset="40%" stop-color="#c0d0e0"/>
      <stop offset="70%" stop-color="#d8dfe8"/>
      <stop offset="100%" stop-color="#e0e5ea"/>
    </linearGradient>
    <linearGradient id="sidewalkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a8a95"/>
      <stop offset="100%" stop-color="#707080"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a55"/>
      <stop offset="100%" stop-color="#3a3a48"/>
    </linearGradient>
    <radialGradient id="mistyGlow" cx="0.3" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Early morning sky — overcast, grey-blue -->
  <rect width="800" height="600" fill="url(#morningSky)"/>

  <!-- Morning mist -->
  <ellipse cx="400" cy="250" rx="500" ry="100" fill="url(#mistyGlow)"/>

  <!-- School building in background -->
  <rect x="0" y="140" width="350" height="200" fill="#6a6a78"/>
  <rect x="10" y="135" width="330" height="205" fill="#7a7a88"/>
  <!-- School windows -->
  <g>
    <rect x="25" y="165" width="28" height="35" fill="#9aa0a8" rx="1"/>
    <rect x="65" y="165" width="28" height="35" fill="#9aa0a8" rx="1"/>
    <rect x="105" y="165" width="28" height="35" fill="#9aa0a8" rx="1"/>
    <rect x="145" y="165" width="28" height="35" fill="#9aa0a8" rx="1"/>
    <rect x="185" y="165" width="28" height="35" fill="#9aa0a8" rx="1"/>
    <rect x="225" y="165" width="28" height="35" fill="#9aa0a8" rx="1"/>
    <rect x="265" y="165" width="28" height="35" fill="#9aa0a8" rx="1"/>
    <rect x="305" y="165" width="28" height="35" fill="#9aa0a8" rx="1"/>
    <!-- Second row -->
    <rect x="25" y="220" width="28" height="35" fill="#9aa0a8" rx="1"/>
    <rect x="65" y="220" width="28" height="35" fill="#9aa0a8" rx="1"/>
    <rect x="105" y="220" width="28" height="35" fill="#9aa0a8" rx="1"/>
    <rect x="145" y="220" width="28" height="35" fill="#9aa0a8" rx="1"/>
    <rect x="185" y="220" width="28" height="35" fill="#9aa0a8" rx="1"/>
    <rect x="225" y="220" width="28" height="35" fill="#9aa0a8" rx="1"/>
    <rect x="265" y="220" width="28" height="35" fill="#9aa0a8" rx="1"/>
    <rect x="305" y="220" width="28" height="35" fill="#9aa0a8" rx="1"/>
  </g>
  <!-- One lit classroom (early teacher) -->
  <rect x="145" y="220" width="28" height="35" fill="#FFE4A0" opacity="0.25" rx="1"/>
  <!-- School entrance -->
  <rect x="140" y="280" width="60" height="60" fill="#5a5a68" rx="3"/>
  <circle cx="190" cy="310" r="3" fill="#888"/>
  <!-- School name -->
  <text x="170" y="150" text-anchor="middle" font-size="7" fill="#555" font-family="sans-serif">COLLEGE RIMBAUD</text>

  <!-- Trees near school -->
  <ellipse cx="360" cy="250" rx="25" ry="30" fill="#5a7a55" opacity="0.5"/>
  <rect x="358" y="278" width="4" height="20" fill="#5a5040" opacity="0.4"/>
  <ellipse cx="400" cy="260" rx="20" ry="25" fill="#5a7a55" opacity="0.4"/>
  <rect x="398" y="283" width="4" height="15" fill="#5a5040" opacity="0.4"/>

  <!-- Sidewalk -->
  <rect x="0" y="340" width="800" height="40" fill="url(#sidewalkGrad)"/>
  <!-- Sidewalk cracks -->
  <line x1="200" y1="340" x2="200" y2="380" stroke="#6a6a78" stroke-width="0.5"/>
  <line x1="400" y1="340" x2="400" y2="380" stroke="#6a6a78" stroke-width="0.5"/>
  <line x1="600" y1="340" x2="600" y2="380" stroke="#6a6a78" stroke-width="0.5"/>

  <!-- Road -->
  <rect x="0" y="380" width="800" height="220" fill="url(#roadGrad)"/>
  <!-- Road center line -->
  <rect x="150" y="480" width="40" height="3" fill="#888" opacity="0.3" rx="1"/>
  <rect x="280" y="480" width="40" height="3" fill="#888" opacity="0.3" rx="1"/>
  <rect x="410" y="480" width="40" height="3" fill="#888" opacity="0.3" rx="1"/>
  <rect x="540" y="480" width="40" height="3" fill="#888" opacity="0.3" rx="1"/>
  <rect x="670" y="480" width="40" height="3" fill="#888" opacity="0.3" rx="1"/>

  <!-- BUS STOP — shelter -->
  <!-- Post -->
  <rect x="498" y="250" width="5" height="100" fill="#555"/>
  <!-- Sign -->
  <rect x="480" y="248" width="40" height="30" fill="#1E40AF" rx="3"/>
  <text x="500" y="268" text-anchor="middle" font-size="10" fill="white" opacity="0.9" font-family="sans-serif">BUS</text>
  <!-- Schedule panel -->
  <rect x="480" y="282" width="40" height="25" fill="#888" rx="2"/>
  <rect x="483" y="285" width="34" height="19" fill="#AAA" rx="1"/>
  <line x1="485" y1="294" x2="515" y2="294" stroke="#777" stroke-width="0.5"/>
  <line x1="485" y1="299" x2="515" y2="299" stroke="#777" stroke-width="0.5"/>

  <!-- Small bus shelter (glass + metal) -->
  <rect x="440" y="260" width="130" height="5" fill="#666" rx="1"/>
  <rect x="442" y="265" width="3" height="78" fill="#666"/>
  <rect x="567" y="265" width="3" height="78" fill="#666"/>
  <!-- Glass back panel -->
  <rect x="445" y="267" width="122" height="73" fill="#b0b8c0" opacity="0.15"/>
  <rect x="445" y="267" width="122" height="73" fill="none" stroke="#888" stroke-width="0.5"/>
  <!-- Ad panel (school sports day poster) -->
  <rect x="455" y="275" width="50" height="55" fill="#5a5a68" rx="1"/>
  <text x="480" y="300" text-anchor="middle" font-size="6" fill="#aaa" font-family="sans-serif">CROSS</text>
  <text x="480" y="310" text-anchor="middle" font-size="5" fill="#999" font-family="sans-serif">DU COLLEGE</text>
  <text x="480" y="322" text-anchor="middle" font-size="5" fill="#c87a50" font-family="sans-serif">15 OCT</text>

  <!-- THE ABANDONED BAG — key narrative detail -->
  <!-- Bag on the ground (no student nearby) -->
  <rect x="515" y="320" width="35" height="30" fill="#2563EB" rx="5"/>
  <rect x="517" y="323" width="31" height="10" fill="#1D4ED8" rx="3"/>
  <path d="M517 323 Q532 317 550 323" fill="#1E40AF" stroke="#1E40AF" stroke-width="0.8"/>
  <!-- Zipper -->
  <line x1="520" y1="333" x2="547" y2="333" stroke="#FFD700" stroke-width="1"/>
  <!-- Front pocket -->
  <rect x="522" y="338" width="20" height="10" fill="#1D4ED8" rx="2"/>
  <!-- Strap on ground -->
  <path d="M518 350 Q514 358 512 365" fill="none" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <!-- Keychain visible -->
  <circle cx="548" cy="345" r="3" fill="#EF4444" opacity="0.5"/>
  <!-- Water bottle sticking out -->
  <rect x="540" y="312" width="5" height="14" fill="#87CEEB" opacity="0.4" rx="1"/>
  <!-- Shadow under bag -->
  <ellipse cx="532" cy="355" rx="22" ry="4" fill="#4a4a55" opacity="0.3"/>

  <!-- STUDENTS in the background (waiting, but not near the bag) -->
  <!-- Student 1 — standing, looking at phone -->
  <circle cx="620" cy="300" r="8" fill="#5a5060"/>
  <path d="M612 308 Q616 304 620 306 Q624 304 628 308 L630 335 L610 335 Z" fill="#3a3545"/>
  <rect x="613" y="335" width="6" height="18" fill="#2a2a38"/>
  <rect x="621" y="335" width="6" height="18" fill="#2a2a38"/>
  <rect x="611" y="351" width="10" height="4" fill="#333" rx="1"/>
  <rect x="619" y="351" width="10" height="4" fill="#333" rx="1"/>
  <!-- Phone -->
  <rect x="616" y="318" width="5" height="8" fill="#222" rx="1"/>
  <rect x="617" y="319" width="3" height="6" fill="#87CEEB" opacity="0.3" rx="0.5"/>

  <!-- Student 2 — leaning against shelter, earbuds -->
  <circle cx="575" cy="298" r="7" fill="#5a4a40"/>
  <ellipse cx="575" cy="293" rx="8" ry="5" fill="#5a4a40"/>
  <path d="M568 305 Q572 300 575 302 Q578 300 582 305 L584 335 L566 335 Z" fill="#8B4513" opacity="0.5"/>
  <rect x="569" y="335" width="5" height="16" fill="#2a2a38"/>
  <rect x="576" y="335" width="5" height="16" fill="#2a2a38"/>
  <!-- Earbud wire -->
  <path d="M580 304 Q584 310 582 320" fill="none" stroke="white" stroke-width="0.6" opacity="0.3"/>

  <!-- Student 3 — distant, walking toward stop -->
  <circle cx="700" cy="310" r="6" fill="#4a4a55" opacity="0.5"/>
  <path d="M694 316 Q697 312 700 314 Q703 312 706 316 L708 340 L692 340 Z" fill="#3a3a45" opacity="0.4"/>
  <rect x="695" y="340" width="4" height="13" fill="#2a2a38" opacity="0.4"/>
  <rect x="701" y="340" width="4" height="13" fill="#2a2a38" opacity="0.4"/>

  <!-- School bus approaching in the distance (headlights on) -->
  <rect x="30" y="405" width="100" height="55" fill="#F59E0B" opacity="0.25" rx="5"/>
  <rect x="35" y="415" width="25" height="18" fill="#87CEEB" opacity="0.1" rx="2"/>
  <rect x="70" y="415" width="25" height="18" fill="#87CEEB" opacity="0.1" rx="2"/>
  <!-- Headlights glow -->
  <circle cx="130" cy="430" r="5" fill="#FFE4A0" opacity="0.3"/>
  <circle cx="130" cy="445" r="5" fill="#FFE4A0" opacity="0.3"/>
  <!-- Light streaks -->
  <line x1="135" y1="430" x2="200" y2="435" stroke="#FFE4A0" stroke-width="1.5" opacity="0.08"/>
  <line x1="135" y1="445" x2="200" y2="448" stroke="#FFE4A0" stroke-width="1.5" opacity="0.08"/>

  <!-- Puddle on road (morning dew/rain) -->
  <ellipse cx="500" cy="420" rx="50" ry="6" fill="#5a5a68" opacity="0.3"/>
  <ellipse cx="500" cy="420" rx="40" ry="4" fill="#6a6a78" opacity="0.2"/>

  <!-- Fallen leaf on sidewalk -->
  <ellipse cx="460" cy="358" rx="4" ry="2" fill="#B45309" opacity="0.3" transform="rotate(30 460 358)"/>
  <ellipse cx="530" cy="362" rx="3" ry="1.5" fill="#D97706" opacity="0.25" transform="rotate(-20 530 362)"/>

  <!-- Street lamp -->
  <rect x="410" y="200" width="4" height="145" fill="#666"/>
  <path d="M404 200 Q412 195 420 200" fill="none" stroke="#666" stroke-width="2.5"/>
  <ellipse cx="412" cy="198" rx="6" ry="3" fill="#FFE4A0" opacity="0.15"/>

  <!-- Slight vignette -->
  <rect x="0" y="0" width="800" height="600" fill="none" stroke="#4a4a55" stroke-width="60" stroke-opacity="0.15"/>
</svg>