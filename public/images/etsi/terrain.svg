<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="duskSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1530"/>
      <stop offset="25%" stop-color="#3a2545"/>
      <stop offset="50%" stop-color="#6a4050"/>
      <stop offset="75%" stop-color="#c47a55"/>
      <stop offset="100%" stop-color="#e8a060"/>
    </linearGradient>
    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a4028"/>
      <stop offset="100%" stop-color="#1e3020"/>
    </linearGradient>
    <radialGradient id="sunsetGlow" cx="0.5" cy="0.85" r="0.5">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#FF6B35" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floodGlow" cx="0.5" cy="1" r="0.8">
      <stop offset="0%" stop-color="#FFE4A0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFE4A0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dusk sky -->
  <rect width="800" height="600" fill="url(#duskSky)"/>

  <!-- Sun glow at horizon -->
  <ellipse cx="400" cy="290" rx="300" ry="80" fill="url(#sunsetGlow)"/>

  <!-- Thin clouds -->
  <ellipse cx="200" cy="80" rx="80" ry="8" fill="#4a3555" opacity="0.4"/>
  <ellipse cx="550" cy="60" rx="60" ry="6" fill="#4a3555" opacity="0.3"/>
  <ellipse cx="650" cy="120" rx="50" ry="5" fill="#5a4060" opacity="0.25"/>

  <!-- School building silhouette (background) -->
  <rect x="0" y="180" width="250" height="120" fill="#1a1520"/>
  <rect x="10" y="170" width="230" height="130" fill="#151218"/>
  <!-- School windows (dark, school is closed) -->
  <rect x="25" y="195" width="20" height="25" fill="#0a0a15" rx="1"/>
  <rect x="55" y="195" width="20" height="25" fill="#0a0a15" rx="1"/>
  <rect x="85" y="195" width="20" height="25" fill="#0a0a15" rx="1"/>
  <rect x="115" y="195" width="20" height="25" fill="#0a0a15" rx="1"/>
  <rect x="145" y="195" width="20" height="25" fill="#0a0a15" rx="1"/>
  <rect x="175" y="195" width="20" height="25" fill="#0a0a15" rx="1"/>
  <rect x="205" y="195" width="20" height="25" fill="#0a0a15" rx="1"/>
  <!-- One window with janitor light -->
  <rect x="85" y="195" width="20" height="25" fill="#2a2518" rx="1"/>
  <!-- School entrance -->
  <rect x="100" y="255" width="40" height="45" fill="#0d0a15" rx="2"/>
  <!-- School name -->
  <text x="120" y="185" text-anchor="middle" font-size="6" fill="#3a3040" font-family="sans-serif">COLLEGE J. PREVERT</text>

  <!-- Gym building (right side) -->
  <rect x="600" y="200" width="200" height="100" fill="#1a1520"/>
  <rect x="610" y="195" width="180" height="105" fill="#151218"/>
  <!-- Gym high windows -->
  <rect x="630" y="210" width="30" height="12" fill="#0a0a15" rx="1"/>
  <rect x="675" y="210" width="30" height="12" fill="#0a0a15" rx="1"/>
  <rect x="720" y="210" width="30" height="12" fill="#0a0a15" rx="1"/>
  <rect x="765" y="210" width="30" height="12" fill="#0a0a15" rx="1"/>

  <!-- Trees lining the field -->
  <ellipse cx="50" cy="265" rx="35" ry="25" fill="#1a2818" opacity="0.8"/>
  <ellipse cx="120" cy="270" rx="30" ry="22" fill="#1a2818" opacity="0.7"/>
  <ellipse cx="680" cy="268" rx="28" ry="20" fill="#1a2818" opacity="0.75"/>
  <ellipse cx="750" cy="272" rx="32" ry="24" fill="#1a2818" opacity="0.7"/>
  <!-- Tree trunks -->
  <rect x="48" y="285" width="4" height="15" fill="#1a1510" opacity="0.6"/>
  <rect x="118" y="287" width="4" height="13" fill="#1a1510" opacity="0.6"/>
  <rect x="748" y="290" width="4" height="10" fill="#1a1510" opacity="0.6"/>

  <!-- THE SPORTS FIELD — grass -->
  <rect x="0" y="300" width="800" height="300" fill="url(#grassGrad)"/>

  <!-- Field markings (white lines) -->
  <!-- Sidelines -->
  <rect x="100" y="310" width="600" height="2" fill="#FFF" opacity="0.15"/>
  <rect x="100" y="310" width="2" height="250" fill="#FFF" opacity="0.12"/>
  <rect x="698" y="310" width="2" height="250" fill="#FFF" opacity="0.12"/>
  <!-- Center line -->
  <rect x="398" y="310" width="2" height="250" fill="#FFF" opacity="0.1"/>
  <!-- Center circle -->
  <ellipse cx="400" cy="435" rx="50" ry="35" fill="none" stroke="#FFF" stroke-width="2" opacity="0.1"/>
  <!-- Penalty areas -->
  <rect x="100" y="385" width="100" height="100" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.1"/>
  <rect x="600" y="385" width="100" height="100" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.1"/>

  <!-- GOAL POSTS — left -->
  <line x1="100" y1="405" x2="100" y2="465" stroke="#DDD" stroke-width="3" opacity="0.4"/>
  <line x1="100" y1="405" x2="75" y2="410" stroke="#DDD" stroke-width="2.5" opacity="0.3"/>
  <line x1="100" y1="465" x2="75" y2="460" stroke="#DDD" stroke-width="2.5" opacity="0.3"/>
  <line x1="75" y1="410" x2="75" y2="460" stroke="#DDD" stroke-width="2" opacity="0.25"/>
  <!-- Crossbar -->
  <line x1="100" y1="405" x2="100" y2="405" stroke="#DDD" stroke-width="3" opacity="0.4"/>
  <!-- Net suggestion -->
  <g stroke="#DDD" stroke-width="0.3" opacity="0.1">
    <line x1="80" y1="415" x2="80" y2="455"/>
    <line x1="85" y1="412" x2="85" y2="458"/>
    <line x1="90" y1="410" x2="90" y2="462"/>
    <line x1="95" y1="407" x2="95" y2="464"/>
    <line x1="78" y1="425" x2="98" y2="420"/>
    <line x1="78" y1="440" x2="98" y2="435"/>
    <line x1="78" y1="450" x2="98" y2="448"/>
  </g>

  <!-- GOAL POSTS — right (distant) -->
  <line x1="700" y1="415" x2="700" y2="455" stroke="#DDD" stroke-width="2.5" opacity="0.3"/>
  <line x1="700" y1="415" x2="720" y2="418" stroke="#DDD" stroke-width="2" opacity="0.2"/>
  <line x1="700" y1="455" x2="720" y2="452" stroke="#DDD" stroke-width="2" opacity="0.2"/>
  <line x1="720" y1="418" x2="720" y2="452" stroke="#DDD" stroke-width="1.5" opacity="0.15"/>

  <!-- Floodlight poles (not lit, dusk) -->
  <rect x="98" y="240" width="4" height="70" fill="#555" opacity="0.5"/>
  <rect x="97" y="238" width="6" height="8" fill="#666" opacity="0.4"/>
  <rect x="698" y="240" width="4" height="70" fill="#555" opacity="0.5"/>
  <rect x="697" y="238" width="6" height="8" fill="#666" opacity="0.4"/>

  <!-- THE ABANDONED BALL — key narrative detail -->
  <!-- Ball shadow -->
  <ellipse cx="382" cy="448" rx="18" ry="4" fill="#0a1510" opacity="0.4"/>
  <!-- Ball (soccer/football) -->
  <circle cx="380" cy="438" r="12" fill="#E8E8E0"/>
  <!-- Ball pentagon pattern -->
  <path d="M380 428 L374 432 L376 439 L384 439 L386 432 Z" fill="#333" opacity="0.3"/>
  <path d="M370 436 L368 442 L374 445 L377 440 Z" fill="#333" opacity="0.25"/>
  <path d="M390 436 L392 442 L386 445 L383 440 Z" fill="#333" opacity="0.25"/>
  <path d="M375 446 L380 449 L385 446" fill="none" stroke="#333" stroke-width="0.8" opacity="0.2"/>
  <!-- Grass blades around ball -->
  <path d="M365 445 Q363 438 365 432" stroke="#3a5a30" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M395 444 Q397 437 395 430" stroke="#3a5a30" stroke-width="1" fill="none" opacity="0.35"/>
  <path d="M375 450 Q373 443 376 436" stroke="#3a5a30" stroke-width="0.8" fill="none" opacity="0.3"/>

  <!-- Worn patches on grass (near goals) -->
  <ellipse cx="120" cy="435" rx="25" ry="12" fill="#3a3828" opacity="0.4"/>
  <ellipse cx="680" cy="435" rx="20" ry="10" fill="#3a3828" opacity="0.3"/>
  <ellipse cx="400" cy="435" rx="15" ry="8" fill="#3a3828" opacity="0.2"/>

  <!-- Water bottle left on sideline -->
  <rect x="550" y="305" width="5" height="15" fill="#87CEEB" opacity="0.3" rx="1"/>
  <rect x="549" y="303" width="7" height="4" fill="#87CEEB" opacity="0.2" rx="1"/>

  <!-- Sweatshirt left on bench area -->
  <path d="M165 308 Q175 302 185 308 Q180 312 175 315 Q170 312 165 308" fill="#C0392B" opacity="0.2"/>

  <!-- First star appearing -->
  <circle cx="200" cy="40" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="600" cy="30" r="1" fill="white" opacity="0.4"/>
  <circle cx="400" cy="25" r="0.8" fill="white" opacity="0.3"/>

  <!-- Bird silhouettes (going home) -->
  <path d="M300 100 Q305 95 310 100" fill="none" stroke="#1a1520" stroke-width="1.5" opacity="0.4"/>
  <path d="M320 95 Q325 90 330 95" fill="none" stroke="#1a1520" stroke-width="1.2" opacity="0.35"/>
  <path d="M290 108 Q294 104 298 108" fill="none" stroke="#1a1520" stroke-width="1" opacity="0.3"/>

  <!-- Subtle mist at field edges -->
  <ellipse cx="400" cy="560" rx="400" ry="30" fill="#2a4028" opacity="0.2"/>
</svg>