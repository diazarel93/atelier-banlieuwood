<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bathroomWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2a"/>
      <stop offset="100%" stop-color="#161622"/>
    </linearGradient>
    <radialGradient id="neonBuzz" cx="0.5" cy="0" r="0.7">
      <stop offset="0%" stop-color="#E0E8F0" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#C0D0E0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C0D0E0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mirrorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a50"/>
      <stop offset="50%" stop-color="#2e2e42"/>
      <stop offset="100%" stop-color="#282840"/>
    </linearGradient>
    <radialGradient id="fogCenter" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#8a8aa0" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#6a6a80" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4a4a60" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="mirrorClip">
      <rect x="230" y="60" width="340" height="300" rx="5"/>
    </clipPath>
  </defs>

  <!-- Bathroom wall — school tile -->
  <rect width="800" height="600" fill="url(#bathroomWall)"/>

  <!-- Tile grid (small school bathroom tiles) -->
  <g stroke="#252535" stroke-width="0.4" opacity="0.6">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="0" y1="550" x2="800" y2="550"/>
    <line x1="50" y1="0" x2="50" y2="600"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="150" y1="0" x2="150" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="250" y1="0" x2="250" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="350" y1="0" x2="350" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="450" y1="0" x2="450" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="550" y1="0" x2="550" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="650" y1="0" x2="650" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
    <line x1="750" y1="0" x2="750" y2="600"/>
  </g>

  <!-- Fluorescent light -->
  <rect x="320" y="10" width="160" height="8" fill="#444" rx="2"/>
  <rect x="325" y="18" width="150" height="3" fill="#E0E8F0" opacity="0.45"/>
  <ellipse cx="400" cy="180" rx="280" ry="160" fill="url(#neonBuzz)"/>

  <!-- MIRROR FRAME (school-standard, rectangular) -->
  <rect x="225" y="55" width="350" height="310" fill="#6a6a7a" rx="4"/>
  <rect x="228" y="58" width="344" height="304" fill="#555568" rx="3"/>

  <!-- Mirror surface -->
  <rect x="230" y="60" width="340" height="300" fill="url(#mirrorGrad)" rx="2"/>

  <!-- FOGGED/CONDENSATION layer over mirror -->
  <g clip-path="url(#mirrorClip)">
    <!-- Steam fog effect -->
    <rect x="230" y="60" width="340" height="300" fill="url(#fogCenter)"/>

    <!-- Condensation droplets scattered -->
    <g fill="#5a5a70" opacity="0.25">
      <circle cx="260" cy="120" r="1.5"/>
      <circle cx="280" cy="90" r="1"/>
      <circle cx="310" cy="140" r="1.2"/>
      <circle cx="340" cy="85" r="0.8"/>
      <circle cx="450" cy="110" r="1.3"/>
      <circle cx="480" cy="150" r="1"/>
      <circle cx="520" cy="90" r="1.1"/>
      <circle cx="540" cy="135" r="0.9"/>
      <circle cx="270" cy="200" r="1"/>
      <circle cx="500" cy="220" r="1.2"/>
      <circle cx="380" cy="310" r="1"/>
      <circle cx="420" cy="280" r="0.8"/>
      <circle cx="300" cy="270" r="1.1"/>
      <circle cx="530" cy="290" r="0.9"/>
    </g>
    <!-- Water drip trails (finger + condensation) -->
    <path d="M310 180 L311 210 L310 240" fill="none" stroke="#5a5a70" stroke-width="1.5" opacity="0.2"/>
    <path d="M490 160 L491 195 L490 225" fill="none" stroke="#5a5a70" stroke-width="1.2" opacity="0.15"/>

    <!-- THE MESSAGE written with finger in the fog -->
    <!-- Letters are clearer where fog was wiped away, revealing darker mirror underneath -->
    <text x="310" y="195" font-family="sans-serif" font-size="32" fill="#2a2a40" opacity="0.6" letter-spacing="2">C EST</text>
    <text x="310" y="240" font-family="sans-serif" font-size="32" fill="#2a2a40" opacity="0.55" letter-spacing="2">PAS</text>
    <!-- Third word is half-smeared/unreadable -->
    <text x="310" y="285" font-family="sans-serif" font-size="32" fill="#2a2a40" opacity="0.35" letter-spacing="2">FIN</text>
    <!-- Smear over the last word (someone tried to erase it) -->
    <ellipse cx="370" cy="278" rx="60" ry="18" fill="#5a5a70" opacity="0.3"/>
    <ellipse cx="380" cy="275" rx="45" ry="15" fill="#5a5a70" opacity="0.2"/>

    <!-- Finger streaks from writing -->
    <path d="M305 172 L308 178" stroke="#3a3a50" stroke-width="2" opacity="0.15" stroke-linecap="round"/>
    <path d="M392 232 L395 245" stroke="#3a3a50" stroke-width="2" opacity="0.12" stroke-linecap="round"/>

    <!-- Vague reflected silhouette of the viewer (behind the fog) -->
    <ellipse cx="400" cy="150" rx="25" ry="20" fill="#262640" opacity="0.15"/>
    <path d="M370 170 Q385 165 400 168 Q415 165 430 170 L435 250 L365 250 Z" fill="#262640" opacity="0.1"/>
  </g>

  <!-- Mirror edge reflections -->
  <line x1="232" y1="62" x2="232" y2="358" stroke="#7a7a8a" stroke-width="0.5" opacity="0.2"/>
  <line x1="232" y1="62" x2="568" y2="62" stroke="#7a7a8a" stroke-width="0.5" opacity="0.15"/>

  <!-- SINK below mirror -->
  <ellipse cx="400" cy="400" rx="90" ry="18" fill="#3a3a4a"/>
  <ellipse cx="400" cy="400" rx="85" ry="15" fill="#2a2a3a"/>
  <!-- Sink basin -->
  <ellipse cx="400" cy="404" rx="60" ry="10" fill="#1e1e2e"/>
  <!-- Faucet -->
  <rect x="396" y="372" width="8" height="18" fill="#777" rx="2"/>
  <path d="M396 372 Q400 367 404 372" fill="#888"/>
  <!-- Faucet spout -->
  <path d="M404 377 Q418 377 418 387" fill="none" stroke="#777" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Drip -->
  <ellipse cx="418" cy="396" rx="1.5" ry="2.5" fill="#5588AA" opacity="0.3"/>

  <!-- Sink pedestal -->
  <rect x="382" y="415" width="36" height="75" fill="#2a2a3a"/>
  <rect x="377" y="488" width="46" height="5" fill="#333345"/>

  <!-- Push-button faucet handles (school style) -->
  <circle cx="384" cy="380" r="5" fill="#777"/>
  <circle cx="416" cy="380" r="5" fill="#777"/>

  <!-- Soap dispenser on wall -->
  <rect x="135" y="280" width="22" height="40" fill="#555" rx="3"/>
  <rect x="140" y="270" width="12" height="15" fill="#666" rx="2"/>
  <!-- Soap drip on wall -->
  <path d="M146 320 Q148 330 146 340" fill="none" stroke="#8ab8a8" stroke-width="2" opacity="0.15"/>

  <!-- Paper towel dispenser on wall -->
  <rect x="640" y="260" width="50" height="60" fill="#555" rx="3"/>
  <rect x="645" y="265" width="40" height="50" fill="#4a4a5a" rx="2"/>
  <!-- Paper sticking out -->
  <rect x="658" y="315" width="15" height="20" fill="#FEFCE8" opacity="0.15" rx="1"/>

  <!-- Stall divider visible on right -->
  <rect x="740" y="100" width="60" height="400" fill="#2a2a3a"/>
  <rect x="740" y="100" width="4" height="400" fill="#333345"/>

  <!-- Stall divider on left -->
  <rect x="0" y="100" width="60" height="400" fill="#2a2a3a"/>
  <rect x="56" y="100" width="4" height="400" fill="#333345"/>

  <!-- Floor -->
  <rect x="0" y="495" width="800" height="105" fill="#181824"/>
  <!-- Floor tiles -->
  <line x1="0" y1="550" x2="800" y2="550" stroke="#1e1e2a" stroke-width="0.5"/>
  <line x1="200" y1="495" x2="200" y2="600" stroke="#1e1e2a" stroke-width="0.5"/>
  <line x1="400" y1="495" x2="400" y2="600" stroke="#1e1e2a" stroke-width="0.5"/>
  <line x1="600" y1="495" x2="600" y2="600" stroke="#1e1e2a" stroke-width="0.5"/>

  <!-- Wet floor near sink -->
  <ellipse cx="400" cy="510" rx="55" ry="7" fill="#1a1a30" opacity="0.3"/>

  <!-- Crumpled paper towel on floor -->
  <path d="M320 520 Q325 515 330 520 Q328 525 320 520" fill="#FEFCE8" opacity="0.1"/>
  <path d="M520 530 Q526 524 532 530 Q530 535 520 530" fill="#FEFCE8" opacity="0.08"/>

  <!-- "WC" graffiti scratched on stall -->
  <text x="750" y="300" font-family="sans-serif" font-size="10" fill="#3a3a4a" opacity="0.2">3B</text>

  <!-- Slight vignette -->
  <rect x="0" y="0" width="800" height="600" fill="none" stroke="#0a0a15" stroke-width="60" stroke-opacity="0.3"/>
</svg>