<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a4a"/>
      <stop offset="100%" stop-color="#2a2a38"/>
    </linearGradient>
    <linearGradient id="skyOutside" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4a460"/>
      <stop offset="35%" stop-color="#e8956a"/>
      <stop offset="70%" stop-color="#c47a8a"/>
      <stop offset="100%" stop-color="#6a5a8a"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a5a"/>
      <stop offset="100%" stop-color="#35354a"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.7" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#FFA500" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFA500" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lightBeam" x1="0.5" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="windowFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a8a9a"/>
      <stop offset="100%" stop-color="#6a6a7a"/>
    </linearGradient>
  </defs>

  <!-- Classroom wall -->
  <rect width="800" height="600" fill="url(#wallGrad)"/>

  <!-- Floor -->
  <rect x="0" y="480" width="800" height="120" fill="url(#floorGrad)"/>
  <line x1="0" y1="480" x2="800" y2="480" stroke="#555568" stroke-width="2"/>
  <!-- Floor tiles hint -->
  <line x1="200" y1="480" x2="180" y2="600" stroke="#3f3f52" stroke-width="0.6"/>
  <line x1="400" y1="480" x2="400" y2="600" stroke="#3f3f52" stroke-width="0.6"/>
  <line x1="600" y1="480" x2="620" y2="600" stroke="#3f3f52" stroke-width="0.6"/>

  <!-- Light beam from window onto floor -->
  <polygon points="230,130 570,130 650,600 150,600" fill="url(#lightBeam)"/>

  <!-- Window recess -->
  <rect x="215" y="100" width="370" height="370" fill="#2a2a38" rx="3"/>

  <!-- THE WINDOW — outside sky visible -->
  <rect x="230" y="115" width="340" height="340" fill="url(#skyOutside)" rx="2"/>
  <rect x="230" y="115" width="340" height="340" fill="url(#sunGlow)" rx="2"/>

  <!-- Outside: empty schoolyard -->
  <rect x="230" y="340" width="340" height="115" fill="#5a6a5a" opacity="0.7"/>
  <!-- Basketball court markings -->
  <ellipse cx="400" cy="395" rx="40" ry="25" fill="none" stroke="#7a8a7a" stroke-width="1.2" opacity="0.5"/>
  <line x1="230" y1="395" x2="570" y2="395" stroke="#7a8a7a" stroke-width="0.8" opacity="0.4"/>
  <!-- Distant fence -->
  <line x1="230" y1="345" x2="570" y2="345" stroke="#4a5a4a" stroke-width="1.5"/>
  <!-- Fence posts -->
  <line x1="260" y1="340" x2="260" y2="350" stroke="#4a5a4a" stroke-width="1.5"/>
  <line x1="310" y1="340" x2="310" y2="350" stroke="#4a5a4a" stroke-width="1.5"/>
  <line x1="360" y1="340" x2="360" y2="350" stroke="#4a5a4a" stroke-width="1.5"/>
  <line x1="410" y1="340" x2="410" y2="350" stroke="#4a5a4a" stroke-width="1.5"/>
  <line x1="460" y1="340" x2="460" y2="350" stroke="#4a5a4a" stroke-width="1.5"/>
  <line x1="510" y1="340" x2="510" y2="350" stroke="#4a5a4a" stroke-width="1.5"/>
  <line x1="540" y1="340" x2="540" y2="350" stroke="#4a5a4a" stroke-width="1.5"/>

  <!-- Distant trees -->
  <ellipse cx="280" cy="325" rx="30" ry="20" fill="#3a5a3a" opacity="0.6"/>
  <ellipse cx="350" cy="320" rx="25" ry="18" fill="#3a5a3a" opacity="0.5"/>
  <ellipse cx="500" cy="328" rx="35" ry="22" fill="#3a5a3a" opacity="0.55"/>
  <rect x="278" y="335" width="4" height="10" fill="#3a3a2a" opacity="0.5"/>
  <rect x="498" y="338" width="4" height="8" fill="#3a3a2a" opacity="0.5"/>

  <!-- Distant building -->
  <rect x="230" y="280" width="60" height="65" fill="#4a5060" opacity="0.4"/>
  <rect x="510" y="290" width="60" height="55" fill="#4a5060" opacity="0.35"/>
  <rect x="238" y="292" width="6" height="6" fill="#887a60" opacity="0.3" rx="0.5"/>
  <rect x="252" y="292" width="6" height="6" fill="#887a60" opacity="0.2" rx="0.5"/>

  <!-- Clouds -->
  <ellipse cx="320" cy="180" rx="40" ry="12" fill="#e8b090" opacity="0.4"/>
  <ellipse cx="480" cy="200" rx="30" ry="10" fill="#d8a080" opacity="0.3"/>

  <!-- Window frame — thick school metal frame -->
  <rect x="225" y="110" width="350" height="350" fill="none" stroke="url(#windowFrame)" stroke-width="10" rx="3"/>
  <!-- Cross bars -->
  <line x1="400" y1="110" x2="400" y2="460" stroke="#7a7a8a" stroke-width="6"/>
  <line x1="225" y1="285" x2="575" y2="285" stroke="#7a7a8a" stroke-width="6"/>
  <!-- Window latch -->
  <rect x="478" y="280" width="20" height="10" fill="#6a6a7a" rx="2"/>
  <circle cx="488" cy="285" r="3" fill="#888"/>

  <!-- WINDOWSILL -->
  <rect x="210" y="455" width="380" height="15" fill="#6a6a7a"/>
  <rect x="210" y="455" width="380" height="3" fill="#8a8a9a"/>

  <!-- PAPER PLANE on the windowsill -->
  <polygon points="340,448 395,438 370,455" fill="#F5F5DC"/>
  <polygon points="340,448 395,438 375,448" fill="#E8E8D0"/>
  <line x1="345" y1="448" x2="393" y2="439" stroke="#CCC" stroke-width="0.5"/>
  <!-- Shadow under paper plane -->
  <ellipse cx="368" cy="458" rx="28" ry="3" fill="#4a4a5a" opacity="0.4"/>
  <!-- Pen lines on the paper -->
  <line x1="354" y1="446" x2="375" y2="442" stroke="#87CEEB" stroke-width="0.4" opacity="0.5"/>
  <line x1="356" y1="449" x2="372" y2="446" stroke="#87CEEB" stroke-width="0.4" opacity="0.5"/>

  <!-- Dust particles in the light beam -->
  <circle cx="350" cy="250" r="1" fill="#FFD700" opacity="0.3"/>
  <circle cx="380" cy="320" r="0.8" fill="#FFD700" opacity="0.25"/>
  <circle cx="420" cy="200" r="1.2" fill="#FFD700" opacity="0.2"/>
  <circle cx="310" cy="380" r="0.9" fill="#FFD700" opacity="0.2"/>
  <circle cx="450" cy="350" r="0.7" fill="#FFD700" opacity="0.15"/>
  <circle cx="370" cy="420" r="1.1" fill="#FFD700" opacity="0.18"/>

  <!-- Classroom clock on wall -->
  <circle cx="660" cy="180" r="22" fill="#3a3a4a" stroke="#555" stroke-width="2"/>
  <circle cx="660" cy="180" r="19" fill="#2d2d3d"/>
  <line x1="660" y1="180" x2="660" y2="166" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="660" y1="180" x2="670" y2="175" stroke="#888" stroke-width="1" stroke-linecap="round"/>
  <circle cx="660" cy="180" r="2" fill="#888"/>
  <text x="660" y="167" text-anchor="middle" font-size="5" fill="#666" font-family="sans-serif">12</text>
  <text x="675" y="182" text-anchor="middle" font-size="5" fill="#666" font-family="sans-serif">3</text>
  <text x="660" y="197" text-anchor="middle" font-size="5" fill="#666" font-family="sans-serif">6</text>
  <text x="645" y="182" text-anchor="middle" font-size="5" fill="#666" font-family="sans-serif">9</text>

  <!-- Classroom poster on right wall -->
  <rect x="680" y="250" width="60" height="80" fill="#3d4050" rx="2"/>
  <rect x="685" y="255" width="50" height="70" fill="#4a5060" rx="1"/>
  <text x="710" y="280" text-anchor="middle" font-size="7" fill="#8a8a9a" font-family="sans-serif">TABLEAU</text>
  <text x="710" y="295" text-anchor="middle" font-size="5" fill="#7a7a8a" font-family="sans-serif">PERIODIQUE</text>

  <!-- Left side: edge of blackboard -->
  <rect x="0" y="150" width="90" height="200" fill="#1a3030" rx="2"/>
  <rect x="5" y="155" width="80" height="190" fill="#1a3a2a"/>
  <line x1="15" y1="200" x2="70" y2="200" stroke="#8a9a8a" stroke-width="0.8" opacity="0.4"/>
  <line x1="15" y1="215" x2="55" y2="215" stroke="#8a9a8a" stroke-width="0.8" opacity="0.3"/>
  <!-- Chalk tray -->
  <rect x="5" y="345" width="80" height="8" fill="#2a2a38"/>
  <rect x="15" y="343" width="12" height="5" fill="#E8E8D0" rx="1" opacity="0.6"/>
  <rect x="35" y="343" width="10" height="5" fill="#87CEEB" rx="1" opacity="0.5"/>

  <!-- Desk edge at bottom -->
  <rect x="50" y="530" width="700" height="40" fill="#5A3720" rx="2"/>
  <rect x="50" y="530" width="700" height="5" fill="#6B4226" rx="1"/>
  <!-- Scratches on desk -->
  <line x1="200" y1="545" x2="250" y2="548" stroke="#4a2a15" stroke-width="0.5" opacity="0.5"/>
  <line x1="400" y1="542" x2="430" y2="540" stroke="#4a2a15" stroke-width="0.4" opacity="0.4"/>
  <!-- Pen on desk -->
  <rect x="550" y="536" width="50" height="4" fill="#2563EB" rx="2"/>
  <polygon points="600,536 608,538 600,540" fill="#888"/>

  <!-- Subtle vignette -->
  <rect x="0" y="0" width="800" height="600" fill="none" stroke="#1a1a2e" stroke-width="80" stroke-opacity="0.3"/>
</svg>