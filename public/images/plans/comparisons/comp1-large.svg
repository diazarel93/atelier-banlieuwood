<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="c1l-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4B599"/>
      <stop offset="100%" stop-color="#A89880"/>
    </linearGradient>
    <linearGradient id="c1l-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8DDD0"/>
      <stop offset="100%" stop-color="#D4C5A9"/>
    </linearGradient>
    <clipPath id="c1l-frame">
      <rect x="16" y="16" width="568" height="340" rx="10"/>
    </clipPath>
  </defs>

  <rect width="600" height="400" rx="12" fill="#1a1a2e"/>

  <g clip-path="url(#c1l-frame)">
    <!-- Hallway walls - perspective -->
    <rect x="16" y="16" width="568" height="340" fill="url(#c1l-wall)"/>

    <!-- Floor with perspective -->
    <path d="M16 220 L584 220 L584 356 L16 356 Z" fill="url(#c1l-floor)"/>

    <!-- Floor tiles -->
    <line x1="100" y1="220" x2="50" y2="356" stroke="#B8A88A" stroke-width="0.5" opacity="0.4"/>
    <line x1="200" y1="220" x2="150" y2="356" stroke="#B8A88A" stroke-width="0.5" opacity="0.4"/>
    <line x1="300" y1="220" x2="300" y2="356" stroke="#B8A88A" stroke-width="0.5" opacity="0.4"/>
    <line x1="400" y1="220" x2="450" y2="356" stroke="#B8A88A" stroke-width="0.5" opacity="0.4"/>
    <line x1="500" y1="220" x2="550" y2="356" stroke="#B8A88A" stroke-width="0.5" opacity="0.4"/>

    <!-- Lockers - left wall -->
    <g opacity="0.7">
      <rect x="30" y="80" width="35" height="135" rx="2" fill="#6B83A0"/>
      <rect x="70" y="80" width="35" height="135" rx="2" fill="#6B83A0"/>
      <rect x="110" y="80" width="35" height="135" rx="2" fill="#6B83A0"/>
      <rect x="150" y="80" width="35" height="135" rx="2" fill="#6B83A0"/>
      <!-- Handles -->
      <rect x="58" y="140" width="4" height="10" rx="1" fill="#4A5568"/>
      <rect x="98" y="140" width="4" height="10" rx="1" fill="#4A5568"/>
      <rect x="138" y="140" width="4" height="10" rx="1" fill="#4A5568"/>
      <rect x="178" y="140" width="4" height="10" rx="1" fill="#4A5568"/>
    </g>

    <!-- Lockers - right wall -->
    <g opacity="0.7">
      <rect x="415" y="80" width="35" height="135" rx="2" fill="#6B83A0"/>
      <rect x="455" y="80" width="35" height="135" rx="2" fill="#6B83A0"/>
      <rect x="495" y="80" width="35" height="135" rx="2" fill="#6B83A0"/>
      <rect x="535" y="80" width="35" height="135" rx="2" fill="#6B83A0"/>
      <rect x="450" y="140" width="4" height="10" rx="1" fill="#4A5568"/>
      <rect x="490" y="140" width="4" height="10" rx="1" fill="#4A5568"/>
      <rect x="530" y="140" width="4" height="10" rx="1" fill="#4A5568"/>
      <rect x="562" y="140" width="4" height="10" rx="1" fill="#4A5568"/>
    </g>

    <!-- Target locker (with message) - center perspective, small -->
    <rect x="275" y="100" width="50" height="110" rx="3" fill="#5A7A9A"/>
    <!-- The message/paper on locker -->
    <rect x="283" y="120" width="34" height="24" rx="1" fill="#FFF8E7" transform="rotate(-3 300 132)"/>
    <line x1="287" y1="127" x2="313" y2="127" stroke="#D4A574" stroke-width="0.8"/>
    <line x1="287" y1="132" x2="310" y2="132" stroke="#D4A574" stroke-width="0.8"/>
    <line x1="287" y1="137" x2="305" y2="137" stroke="#D4A574" stroke-width="0.8"/>

    <!-- Main student - small, at distance, discovering message -->
    <circle cx="300" cy="220" r="6" fill="#D4A574"/>
    <rect x="294" y="226" width="12" height="20" rx="3" fill="#3B82F6"/>
    <rect x="294" y="246" width="5" height="14" rx="2" fill="#4A5568"/>
    <rect x="301" y="246" width="5" height="14" rx="2" fill="#4A5568"/>

    <!-- Other students passing by - not noticing -->
    <!-- Student walking left -->
    <circle cx="140" cy="240" r="5" fill="#C68642"/>
    <rect x="136" y="245" width="8" height="16" rx="2" fill="#EF4444"/>
    <rect x="136" y="261" width="3" height="10" rx="1" fill="#4A5568"/>
    <rect x="141" y="261" width="3" height="10" rx="1" fill="#4A5568"/>

    <!-- Student walking right -->
    <circle cx="450" cy="245" r="5" fill="#D4A574"/>
    <rect x="446" y="250" width="8" height="16" rx="2" fill="#10B981"/>
    <rect x="446" y="266" width="3" height="10" rx="1" fill="#4A5568"/>
    <rect x="451" y="266" width="3" height="10" rx="1" fill="#4A5568"/>

    <!-- Pair of students far back -->
    <circle cx="200" cy="230" r="4" fill="#D4A574"/>
    <rect x="197" y="234" width="6" height="12" rx="2" fill="#8B5CF6"/>
    <circle cx="215" cy="232" r="4" fill="#C68642"/>
    <rect x="212" y="236" width="6" height="12" rx="2" fill="#F59E0B"/>

    <!-- Ceiling lights -->
    <rect x="200" y="20" width="40" height="6" rx="2" fill="#FFF8E7" opacity="0.6"/>
    <rect x="360" y="20" width="40" height="6" rx="2" fill="#FFF8E7" opacity="0.6"/>
  </g>

  <!-- Frame -->
  <rect x="16" y="16" width="568" height="340" rx="10" fill="none" stroke="white" stroke-width="1.5" opacity="0.25"/>

  <!-- Label -->
  <rect x="150" y="366" width="300" height="26" rx="6" fill="white" opacity="0.08"/>
  <text x="300" y="384" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.6">PLAN LARGE — Le couloir entier</text>
</svg>