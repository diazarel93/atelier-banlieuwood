<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="duskSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c1810"/>
      <stop offset="40%" stop-color="#4a2520"/>
      <stop offset="70%" stop-color="#6b3a28"/>
      <stop offset="100%" stop-color="#8a5535"/>
    </linearGradient>
    <linearGradient id="mud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a4a38"/>
      <stop offset="100%" stop-color="#4a3a28"/>
    </linearGradient>
  </defs>

  <!-- Dusk sky -->
  <rect width="800" height="600" fill="url(#duskSky)"/>

  <!-- Sun setting (very low) -->
  <circle cx="400" cy="210" r="25" fill="#FF6B35" opacity="0.5"/>
  <circle cx="400" cy="210" r="40" fill="#FF6B35" opacity="0.15"/>

  <!-- LEFT BUILDING — HLM tower -->
  <rect x="-20" y="50" width="200" height="550" fill="#1a1a25"/>
  <rect x="-10" y="60" width="180" height="540" fill="#222230"/>
  <!-- Windows grid -->
  <g fill="#0a0a15">
    <rect x="10" y="80" width="25" height="30" rx="1"/>
    <rect x="50" y="80" width="25" height="30" rx="1"/>
    <rect x="90" y="80" width="25" height="30" rx="1"/>
    <rect x="130" y="80" width="25" height="30" rx="1"/>

    <rect x="10" y="130" width="25" height="30" rx="1"/>
    <rect x="50" y="130" width="25" height="30" rx="1"/>
    <rect x="90" y="130" width="25" height="30" rx="1"/>
    <rect x="130" y="130" width="25" height="30" rx="1"/>

    <rect x="10" y="180" width="25" height="30" rx="1"/>
    <rect x="50" y="180" width="25" height="30" rx="1"/>
    <rect x="90" y="180" width="25" height="30" rx="1"/>
    <rect x="130" y="180" width="25" height="30" rx="1"/>

    <rect x="10" y="230" width="25" height="30" rx="1"/>
    <rect x="50" y="230" width="25" height="30" rx="1"/>
    <rect x="90" y="230" width="25" height="30" rx="1"/>
    <rect x="130" y="230" width="25" height="30" rx="1"/>
  </g>
  <!-- Lit windows -->
  <rect x="50" y="130" width="25" height="30" fill="#FFE4A0" opacity="0.15" rx="1"/>
  <rect x="130" y="230" width="25" height="30" fill="#87CEEB" opacity="0.1" rx="1"/>
  <rect x="10" y="180" width="25" height="30" fill="#FFE4A0" opacity="0.1" rx="1"/>

  <!-- RIGHT BUILDING — lower, wider -->
  <rect x="620" y="120" width="200" height="480" fill="#1a1a25"/>
  <rect x="630" y="130" width="180" height="470" fill="#222230"/>
  <g fill="#0a0a15">
    <rect x="650" y="150" width="25" height="30" rx="1"/>
    <rect x="690" y="150" width="25" height="30" rx="1"/>
    <rect x="730" y="150" width="25" height="30" rx="1"/>
    <rect x="770" y="150" width="25" height="30" rx="1"/>

    <rect x="650" y="200" width="25" height="30" rx="1"/>
    <rect x="690" y="200" width="25" height="30" rx="1"/>
    <rect x="730" y="200" width="25" height="30" rx="1"/>
    <rect x="770" y="200" width="25" height="30" rx="1"/>

    <rect x="650" y="250" width="25" height="30" rx="1"/>
    <rect x="690" y="250" width="25" height="30" rx="1"/>
    <rect x="730" y="250" width="25" height="30" rx="1"/>
    <rect x="770" y="250" width="25" height="30" rx="1"/>
  </g>
  <rect x="690" y="200" width="25" height="30" fill="#FFE4A0" opacity="0.12" rx="1"/>
  <rect x="770" y="250" width="25" height="30" fill="#FFE4A0" opacity="0.08" rx="1"/>

  <!-- TERRAIN VAGUE — muddy ground between buildings -->
  <rect x="0" y="320" width="800" height="280" fill="url(#mud)"/>

  <!-- Mud puddles -->
  <ellipse cx="350" cy="400" rx="50" ry="8" fill="#3a2a18" opacity="0.6"/>
  <ellipse cx="350" cy="400" rx="40" ry="5" fill="#4a3828" opacity="0.4"/>
  <ellipse cx="550" cy="450" rx="35" ry="6" fill="#3a2a18" opacity="0.5"/>
  <ellipse cx="250" cy="480" rx="45" ry="7" fill="#3a2a18" opacity="0.4"/>
  <!-- Reflection in puddle -->
  <rect x="330" y="396" width="15" height="6" fill="#FF6B35" opacity="0.06" rx="1"/>

  <!-- FOOTPRINTS in the mud — trail going from left building toward right -->
  <g fill="#3a2a1a" opacity="0.5">
    <!-- Left foot, right foot alternating -->
    <ellipse cx="230" cy="360" rx="5" ry="8" transform="rotate(-15 230 360)"/>
    <ellipse cx="248" cy="370" rx="5" ry="8" transform="rotate(10 248 370)"/>
    <ellipse cx="270" cy="365" rx="5" ry="8" transform="rotate(-10 270 365)"/>
    <ellipse cx="295" cy="378" rx="5" ry="8" transform="rotate(15 295 378)"/>
    <ellipse cx="320" cy="372" rx="5" ry="8" transform="rotate(-5 320 372)"/>
    <ellipse cx="348" cy="385" rx="5" ry="8" transform="rotate(10 348 385)"/>
    <ellipse cx="375" cy="380" rx="5" ry="8" transform="rotate(-8 375 380)"/>
    <ellipse cx="405" cy="392" rx="5" ry="8" transform="rotate(12 405 392)"/>
    <ellipse cx="435" cy="388" rx="5" ry="8" transform="rotate(-5 435 388)"/>
    <ellipse cx="465" cy="398" rx="5" ry="8" transform="rotate(8 465 398)"/>
    <ellipse cx="495" cy="395" rx="5" ry="8" transform="rotate(-10 495 395)"/>
    <ellipse cx="525" cy="405" rx="5" ry="8" transform="rotate(5 525 405)"/>
    <ellipse cx="555" cy="400" rx="5" ry="8" transform="rotate(-12 555 400)"/>
    <ellipse cx="580" cy="410" rx="5" ry="8" transform="rotate(8 580 410)"/>
  </g>

  <!-- Abandoned objects on terrain -->
  <!-- Old tire -->
  <ellipse cx="450" cy="440" rx="18" ry="12" fill="none" stroke="#333" stroke-width="5"/>
  <ellipse cx="450" cy="440" rx="8" ry="5" fill="#4a3a28"/>

  <!-- Broken bottle -->
  <rect x="300" cy="460" width="4" height="12" fill="#88AA88" opacity="0.3"/>
  <polygon points="296,472 308,472 304,460 300,460" fill="#88AA88" opacity="0.2"/>

  <!-- Rusty shopping cart (on its side) -->
  <rect x="500" y="435" width="35" height="20" fill="none" stroke="#666" stroke-width="1.5" rx="2" transform="rotate(15 517 445)"/>
  <circle cx="505" cy="458" r="4" fill="none" stroke="#555" stroke-width="1.5"/>
  <circle cx="530" cy="462" r="4" fill="none" stroke="#555" stroke-width="1.5"/>

  <!-- Weeds / wild grass -->
  <g stroke="#4a6a30" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M200 335 Q195 310 200 290"/>
    <path d="M205 335 Q210 315 205 300"/>
    <path d="M195 335 Q188 318 192 305"/>
    <path d="M560 345 Q555 320 560 305"/>
    <path d="M565 345 Q570 325 565 310"/>
    <path d="M380 350 Q375 330 380 318"/>
    <path d="M385 350 Q390 335 386 322"/>
  </g>

  <!-- Fence remains (broken chain link) -->
  <line x1="180" y1="310" x2="180" y2="380" stroke="#555" stroke-width="2"/>
  <line x1="180" y1="315" x2="195" y2="320" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="195" y1="310" x2="195" y2="355" stroke="#555" stroke-width="2"/>
  <!-- Broken part hanging -->
  <path d="M195 355 Q200 360 198 370" stroke="#555" stroke-width="1.5" fill="none"/>

  <!-- Graffiti on left building wall base -->
  <text x="100" y="330" font-family="sans-serif" font-weight="bold" font-size="18" fill="#EF4444" opacity="0.2">LIBRE</text>

  <!-- Bird on wire between buildings -->
  <line x1="170" y1="135" x2="635" y2="155" stroke="#333" stroke-width="1"/>
  <ellipse cx="400" cy="144" rx="5" ry="3" fill="#222"/>

  <!-- Distant crane silhouette -->
  <line x1="400" y1="50" x2="400" y2="200" stroke="#1a1a25" stroke-width="2" opacity="0.4"/>
  <line x1="350" y1="60" x2="450" y2="60" stroke="#1a1a25" stroke-width="2" opacity="0.4"/>
  <line x1="400" y1="60" x2="420" y2="200" stroke="#1a1a25" stroke-width="1" opacity="0.3"/>

  <!-- Satellite dish on right building -->
  <circle cx="640" cy="145" r="8" fill="none" stroke="#444" stroke-width="1.5"/>
  <line x1="640" y1="145" x2="640" y2="135" stroke="#444" stroke-width="1.5"/>
</svg>