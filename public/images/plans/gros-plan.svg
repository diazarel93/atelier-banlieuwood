<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="face-light" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#E8C4A0"/>
      <stop offset="100%" stop-color="#C68642"/>
    </radialGradient>
    <radialGradient id="bg-dark" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#2D2540"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>
    <clipPath id="frame-g">
      <rect x="20" y="20" width="760" height="320" rx="12"/>
    </clipPath>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Frame background -->
  <rect width="800" height="400" rx="16" fill="#1a1a2e"/>

  <g clip-path="url(#frame-g)">
    <!-- Dark blurred background - no detail -->
    <rect x="20" y="20" width="760" height="320" fill="url(#bg-dark)"/>

    <!-- Face fills the frame -->
    <!-- Head shape -->
    <ellipse cx="400" cy="185" rx="130" ry="155" fill="url(#face-light)" filter="url(#soft-shadow)"/>

    <!-- Hair -->
    <path d="M270 150 Q270 60 400 45 Q530 60 530 150 L530 130 Q530 50 400 35 Q270 50 270 130 Z" fill="#1A0F0A"/>
    <path d="M270 150 Q265 120 275 100" fill="#1A0F0A"/>
    <path d="M530 150 Q535 120 525 100" fill="#1A0F0A"/>
    <!-- Hair strands -->
    <path d="M310 80 Q340 65 370 70" stroke="#2D1B0E" stroke-width="2" fill="none"/>
    <path d="M430 70 Q460 65 490 80" stroke="#2D1B0E" stroke-width="2" fill="none"/>

    <!-- Eyebrows (expressive - slightly raised) -->
    <path d="M330 140 Q350 130 375 135" stroke="#3D2B1F" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M425 135 Q450 130 470 140" stroke="#3D2B1F" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- Eyes - big and expressive -->
    <!-- Left eye -->
    <ellipse cx="355" cy="165" rx="22" ry="18" fill="white"/>
    <circle cx="358" cy="165" r="12" fill="#4A3728"/>
    <circle cx="358" cy="165" r="7" fill="#1A0F0A"/>
    <circle cx="363" cy="159" r="4" fill="white" opacity="0.8"/>
    <circle cx="352" cy="170" r="2" fill="white" opacity="0.4"/>
    <!-- Right eye -->
    <ellipse cx="445" cy="165" rx="22" ry="18" fill="white"/>
    <circle cx="442" cy="165" r="12" fill="#4A3728"/>
    <circle cx="442" cy="165" r="7" fill="#1A0F0A"/>
    <circle cx="447" cy="159" r="4" fill="white" opacity="0.8"/>
    <circle cx="437" cy="170" r="2" fill="white" opacity="0.4"/>

    <!-- Nose (subtle) -->
    <path d="M395 185 Q400 200 405 185" stroke="#B8956A" stroke-width="1.5" fill="none"/>

    <!-- Mouth - emotional, quivering smile -->
    <path d="M365 225 Q380 245 400 248 Q420 245 435 225" stroke="#C4775C" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Tear on left cheek -->
    <ellipse cx="340" cy="200" rx="4" ry="6" fill="#87CEEB" opacity="0.7"/>
    <ellipse cx="340" cy="195" rx="2.5" ry="3" fill="#B8DCF0" opacity="0.5"/>
    <!-- Tear trail -->
    <path d="M340 206 Q339 215 341 225" stroke="#87CEEB" stroke-width="1.5" opacity="0.4" fill="none"/>

    <!-- Subtle blush -->
    <ellipse cx="340" cy="210" rx="20" ry="10" fill="#E8A0A0" opacity="0.2"/>
    <ellipse cx="460" cy="210" rx="20" ry="10" fill="#E8A0A0" opacity="0.2"/>

    <!-- Neck starts at bottom -->
    <rect x="375" y="320" width="50" height="20" rx="8" fill="#C68642"/>
  </g>

  <!-- Viewfinder frame -->
  <rect x="20" y="20" width="760" height="320" rx="12" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>

  <!-- Corner marks -->
  <path d="M35 30 L35 40" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M30 35 L40 35" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M765 30 L765 40" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M760 35 L770 35" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M35 330 L35 320" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M30 325 L40 325" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M765 330 L765 320" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M760 325 L770 325" stroke="white" stroke-width="1.5" opacity="0.5"/>

  <!-- Caption -->
  <rect x="200" y="355" width="400" height="32" rx="8" fill="white" opacity="0.08"/>
  <text x="400" y="376" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" opacity="0.7">GROS PLAN — On ressent l'emotion</text>
</svg>