<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="classWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a38"/>
      <stop offset="100%" stop-color="#222230"/>
    </linearGradient>
    <linearGradient id="classFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a4a"/>
      <stop offset="100%" stop-color="#2d2d3d"/>
    </linearGradient>
    <radialGradient id="phoneGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#3B82F6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dimLight" cx="0.4" cy="0" r="0.6">
      <stop offset="0%" stop-color="#E0E8F0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#E0E8F0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="windowAfternoon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c47a8a"/>
      <stop offset="100%" stop-color="#6a5a8a"/>
    </linearGradient>
  </defs>

  <!-- Classroom walls -->
  <rect width="800" height="600" fill="url(#classWall)"/>

  <!-- Ceiling -->
  <rect x="0" y="0" width="800" height="40" fill="#232233"/>

  <!-- Ceiling light (off — only faint ambient) -->
  <rect x="350" y="35" width="100" height="5" fill="#3a3a4a" rx="1"/>
  <ellipse cx="400" cy="200" rx="300" ry="180" fill="url(#dimLight)"/>

  <!-- Floor -->
  <rect x="0" y="460" width="800" height="140" fill="url(#classFloor)"/>
  <line x1="0" y1="460" x2="800" y2="460" stroke="#444458" stroke-width="1"/>
  <!-- Floor tiles -->
  <line x1="160" y1="460" x2="160" y2="600" stroke="#333345" stroke-width="0.4"/>
  <line x1="320" y1="460" x2="320" y2="600" stroke="#333345" stroke-width="0.4"/>
  <line x1="480" y1="460" x2="480" y2="600" stroke="#333345" stroke-width="0.4"/>
  <line x1="640" y1="460" x2="640" y2="600" stroke="#333345" stroke-width="0.4"/>
  <line x1="0" y1="530" x2="800" y2="530" stroke="#333345" stroke-width="0.4"/>

  <!-- BLACKBOARD on back wall -->
  <rect x="100" y="60" width="400" height="200" fill="#1a3030" rx="3"/>
  <rect x="105" y="65" width="390" height="190" fill="#1a3a2a"/>
  <!-- Chalk tray -->
  <rect x="105" y="255" width="390" height="8" fill="#2a2a38"/>
  <rect x="130" y="253" width="14" height="5" fill="#E8E8D0" rx="1" opacity="0.5"/>
  <rect x="155" y="253" width="10" height="5" fill="#FFE4A0" rx="1" opacity="0.4"/>
  <rect x="175" y="253" width="12" height="5" fill="#87CEEB" rx="1" opacity="0.3"/>
  <!-- Eraser -->
  <rect x="420" y="250" width="30" height="10" fill="#5a5a5a" rx="2"/>

  <!-- Faint chalk writing left on board (not fully erased) -->
  <text x="180" y="130" font-family="sans-serif" font-size="14" fill="#5a7a6a" opacity="0.2">y = ax + b</text>
  <text x="150" y="180" font-family="sans-serif" font-size="11" fill="#5a7a6a" opacity="0.15">exercice p.47</text>
  <!-- Ghost of erased work -->
  <rect x="250" y="100" width="120" height="80" fill="#1e3828" opacity="0.15"/>

  <!-- Windows on right wall (late afternoon light) -->
  <rect x="560" y="60" width="90" height="120" fill="url(#windowAfternoon)" opacity="0.2" rx="2"/>
  <rect x="560" y="60" width="90" height="120" fill="none" stroke="#555" stroke-width="3"/>
  <line x1="605" y1="60" x2="605" y2="180" stroke="#555" stroke-width="2"/>
  <line x1="560" y1="120" x2="650" y2="120" stroke="#555" stroke-width="2"/>

  <rect x="680" y="60" width="90" height="120" fill="url(#windowAfternoon)" opacity="0.18" rx="2"/>
  <rect x="680" y="60" width="90" height="120" fill="none" stroke="#555" stroke-width="3"/>
  <line x1="725" y1="60" x2="725" y2="180" stroke="#555" stroke-width="2"/>
  <line x1="680" y1="120" x2="770" y2="120" stroke="#555" stroke-width="2"/>

  <!-- Fading afternoon light beam from windows -->
  <polygon points="560,180 770,180 800,600 500,600" fill="#c47a8a" opacity="0.02"/>

  <!-- STACKED CHAIRS (end-of-day feel) -->
  <!-- Stack 1 (left area) -->
  <g transform="translate(80,300)">
    <rect x="0" y="0" width="35" height="3" fill="#2563EB" opacity="0.25" rx="1"/>
    <rect x="0" y="-18" width="35" height="3" fill="#2563EB" opacity="0.2" rx="1"/>
    <rect x="0" y="-36" width="35" height="3" fill="#2563EB" opacity="0.15" rx="1"/>
    <rect x="0" y="-54" width="35" height="3" fill="#2563EB" opacity="0.12" rx="1"/>
    <line x1="2" y1="3" x2="0" y2="40" stroke="#555" stroke-width="2"/>
    <line x1="33" y1="3" x2="35" y2="40" stroke="#555" stroke-width="2"/>
    <line x1="2" y1="-54" x2="2" y2="-72" stroke="#555" stroke-width="1.5"/>
    <line x1="33" y1="-54" x2="33" y2="-72" stroke="#555" stroke-width="1.5"/>
  </g>

  <!-- Stack 2 -->
  <g transform="translate(140,310)">
    <rect x="0" y="0" width="35" height="3" fill="#2563EB" opacity="0.22" rx="1"/>
    <rect x="0" y="-18" width="35" height="3" fill="#2563EB" opacity="0.18" rx="1"/>
    <rect x="0" y="-36" width="35" height="3" fill="#2563EB" opacity="0.14" rx="1"/>
    <line x1="2" y1="3" x2="0" y2="40" stroke="#555" stroke-width="2"/>
    <line x1="33" y1="3" x2="35" y2="40" stroke="#555" stroke-width="2"/>
    <line x1="2" y1="-36" x2="2" y2="-54" stroke="#555" stroke-width="1.5"/>
    <line x1="33" y1="-36" x2="33" y2="-54" stroke="#555" stroke-width="1.5"/>
  </g>

  <!-- Stack 3 (right area) -->
  <g transform="translate(600,320)">
    <rect x="0" y="0" width="35" height="3" fill="#2563EB" opacity="0.2" rx="1"/>
    <rect x="0" y="-18" width="35" height="3" fill="#2563EB" opacity="0.15" rx="1"/>
    <rect x="0" y="-36" width="35" height="3" fill="#2563EB" opacity="0.12" rx="1"/>
    <rect x="0" y="-54" width="35" height="3" fill="#2563EB" opacity="0.1" rx="1"/>
    <rect x="0" y="-72" width="35" height="3" fill="#2563EB" opacity="0.08" rx="1"/>
    <line x1="2" y1="3" x2="0" y2="40" stroke="#555" stroke-width="2"/>
    <line x1="33" y1="3" x2="35" y2="40" stroke="#555" stroke-width="2"/>
    <line x1="2" y1="-72" x2="2" y2="-90" stroke="#555" stroke-width="1.5"/>
    <line x1="33" y1="-72" x2="33" y2="-90" stroke="#555" stroke-width="1.5"/>
  </g>

  <!-- Stack 4 -->
  <g transform="translate(660,315)">
    <rect x="0" y="0" width="35" height="3" fill="#2563EB" opacity="0.18" rx="1"/>
    <rect x="0" y="-18" width="35" height="3" fill="#2563EB" opacity="0.14" rx="1"/>
    <rect x="0" y="-36" width="35" height="3" fill="#2563EB" opacity="0.1" rx="1"/>
    <line x1="2" y1="3" x2="0" y2="40" stroke="#555" stroke-width="2"/>
    <line x1="33" y1="3" x2="35" y2="40" stroke="#555" stroke-width="2"/>
    <line x1="2" y1="-36" x2="2" y2="-54" stroke="#555" stroke-width="1.5"/>
    <line x1="33" y1="-36" x2="33" y2="-54" stroke="#555" stroke-width="1.5"/>
  </g>

  <!-- THE DESK with phone — key narrative detail (center of composition) -->
  <!-- Desk (school desk, metal frame + wood top) -->
  <rect x="310" y="370" width="180" height="8" fill="#6B4226" rx="1"/>
  <rect x="310" y="366" width="180" height="5" fill="#7a5232" rx="1"/>
  <!-- Desk metal frame legs -->
  <path d="M318 378 L315 458" fill="none" stroke="#555" stroke-width="3"/>
  <path d="M482 378 L485 458" fill="none" stroke="#555" stroke-width="3"/>
  <!-- Desk feet -->
  <rect x="310" y="455" width="10" height="3" fill="#555" rx="1"/>
  <rect x="480" y="455" width="10" height="3" fill="#555" rx="1"/>
  <!-- Under-desk shelf -->
  <rect x="320" y="418" width="160" height="5" fill="#5a5a5a"/>

  <!-- Book left in desk shelf -->
  <rect x="340" y="410" width="40" height="8" fill="#1E40AF" opacity="0.2" rx="1"/>
  <rect x="340" y="410" width="40" height="2" fill="#2563EB" opacity="0.15" rx="1"/>

  <!-- THE PHONE — screen lit up, forgotten -->
  <rect x="380" y="348" width="40" height="22" fill="#111" rx="3"/>
  <rect x="382" y="350" width="36" height="18" fill="#3B82F6" opacity="0.5" rx="2"/>
  <!-- Phone screen content (notification) -->
  <rect x="385" y="353" width="30" height="4" fill="#FFF" opacity="0.15" rx="1"/>
  <rect x="385" y="360" width="22" height="3" fill="#FFF" opacity="0.08" rx="0.5"/>
  <!-- Phone glow on desk surface -->
  <ellipse cx="400" cy="368" rx="40" ry="15" fill="url(#phoneGlow)"/>
  <!-- Phone glow on ceiling (faint) -->
  <ellipse cx="400" cy="40" rx="30" ry="10" fill="#3B82F6" opacity="0.02"/>
  <!-- Phone shadow -->
  <ellipse cx="400" cy="372" rx="22" ry="2" fill="#1a1a28" opacity="0.3"/>

  <!-- Pencil case on desk (someone left in a hurry) -->
  <rect x="435" y="355" width="40" height="15" fill="#8B4513" opacity="0.25" rx="3"/>
  <path d="M435 355 Q455 350 475 355" fill="#6B3410" opacity="0.15"/>
  <!-- Pencil sticking out -->
  <rect x="468" y="345" width="3" height="15" fill="#FFD700" opacity="0.2" rx="0.5" transform="rotate(20 469 352)"/>

  <!-- Teacher's desk (far back, near blackboard) -->
  <rect x="200" y="280" width="200" height="8" fill="#5A3720" rx="1"/>
  <rect x="200" y="276" width="200" height="5" fill="#6B4226" rx="1"/>
  <rect x="205" y="288" width="5" height="35" fill="#444"/>
  <rect x="390" y="288" width="5" height="35" fill="#444"/>
  <!-- Teacher's chair (pushed in) -->
  <rect x="270" y="310" width="60" height="5" fill="#333" rx="2"/>
  <rect x="270" y="300" width="60" height="12" fill="#333" rx="2"/>
  <rect x="275" y="315" width="4" height="15" fill="#444"/>
  <rect x="321" y="315" width="4" height="15" fill="#444"/>

  <!-- Map poster on wall -->
  <rect x="530" y="200" width="70" height="50" fill="#2a3a4a" rx="1"/>
  <rect x="533" y="203" width="64" height="44" fill="#2a4050" rx="1"/>
  <!-- Europe shape hint -->
  <path d="M550 215 Q560 210 570 215 Q575 225 565 235 Q555 240 545 235 Q540 225 550 215" fill="#3a5060" opacity="0.4"/>

  <!-- Door to hallway -->
  <rect x="0" y="55" width="50" height="400" fill="#3a3040" rx="2"/>
  <rect x="3" y="60" width="44" height="390" fill="#302838"/>
  <!-- Door window -->
  <rect x="10" y="80" width="30" height="45" fill="#2a2a40" rx="1"/>
  <!-- Door handle -->
  <circle cx="40" cy="260" r="4" fill="#888" opacity="0.5"/>
  <!-- Light from hallway -->
  <rect x="10" y="80" width="30" height="45" fill="#E0E8F0" opacity="0.04" rx="1"/>

  <!-- Vignette -->
  <rect x="0" y="0" width="800" height="600" fill="none" stroke="#0a0a15" stroke-width="60" stroke-opacity="0.35"/>
</svg>