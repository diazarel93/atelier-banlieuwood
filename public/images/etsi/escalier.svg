<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="stairWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a25"/>
      <stop offset="100%" stop-color="#141420"/>
    </linearGradient>
    <radialGradient id="fluorescent1" cx="0.5" cy="0" r="0.7">
      <stop offset="0%" stop-color="#E0E8F0" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#C0D0E0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C0D0E0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fluorescent2" cx="0.5" cy="0" r="0.5">
      <stop offset="0%" stop-color="#E0E8F0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C0D0E0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="exitGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Stairwell walls -->
  <rect width="800" height="600" fill="url(#stairWall)"/>

  <!-- Left wall -->
  <rect x="80" y="0" width="20" height="600" fill="#1e1e2a"/>
  <!-- Right wall -->
  <rect x="700" y="0" width="20" height="600" fill="#1e1e2a"/>

  <!-- Ceiling area with fluorescent light fixture -->
  <rect x="100" y="0" width="600" height="600" fill="#151520"/>

  <!-- Fluorescent tube 1 (top, flickering dim) -->
  <rect x="340" y="25" width="120" height="6" fill="#333" rx="2"/>
  <rect x="345" y="27" width="110" height="3" fill="#C0D0E0" opacity="0.4"/>
  <!-- Light buzz glow -->
  <ellipse cx="400" cy="150" rx="250" ry="120" fill="url(#fluorescent1)"/>

  <!-- Fluorescent tube 2 (lower landing, dimmer) -->
  <rect x="360" y="340" width="80" height="5" fill="#333" rx="2"/>
  <rect x="363" y="341" width="74" height="3" fill="#C0D0E0" opacity="0.2"/>
  <ellipse cx="400" cy="400" rx="180" ry="80" fill="url(#fluorescent2)"/>

  <!-- Wall paint — institutional beige/green two-tone -->
  <!-- Lower half darker -->
  <rect x="100" y="300" width="600" height="300" fill="#161622" opacity="0.3"/>
  <!-- Paint divider strip -->
  <line x1="100" y1="300" x2="700" y2="300" stroke="#2a2a35" stroke-width="2"/>

  <!-- Floor number painted on wall (large) -->
  <text x="140" y="180" font-family="sans-serif" font-weight="bold" font-size="50" fill="#2a2a35" opacity="0.3">2</text>

  <!-- STAIRS descending — perspective from mid-landing looking down -->
  <!-- Upper flight (going down-left) -->
  <g>
    <!-- Step risers (visible face) -->
    <rect x="150" y="65" width="500" height="8" fill="#222230"/>
    <rect x="150" y="63" width="500" height="4" fill="#282838"/>

    <rect x="160" y="100" width="480" height="10" fill="#202030"/>
    <rect x="160" y="97" width="480" height="5" fill="#262636"/>

    <rect x="170" y="140" width="460" height="12" fill="#1e1e2c"/>
    <rect x="170" y="137" width="460" height="5" fill="#242434"/>

    <rect x="180" y="185" width="440" height="13" fill="#1c1c28"/>
    <rect x="180" y="182" width="440" height="5" fill="#222232"/>

    <rect x="190" y="235" width="420" height="14" fill="#1a1a26"/>
    <rect x="190" y="232" width="420" height="5" fill="#202030"/>
  </g>

  <!-- Landing platform -->
  <rect x="130" y="280" width="540" height="50" fill="#18181e"/>
  <rect x="130" y="278" width="540" height="4" fill="#1e1e2a"/>

  <!-- Lower flight (going down-right) -->
  <g>
    <rect x="140" y="360" width="520" height="14" fill="#161622"/>
    <rect x="140" y="357" width="520" height="5" fill="#1c1c28"/>

    <rect x="130" y="405" width="540" height="16" fill="#14141e"/>
    <rect x="130" y="402" width="540" height="5" fill="#1a1a26"/>

    <rect x="120" y="455" width="560" height="18" fill="#12121c"/>
    <rect x="120" y="452" width="560" height="5" fill="#181824"/>

    <rect x="110" y="510" width="580" height="20" fill="#10101a"/>
    <rect x="110" y="507" width="580" height="5" fill="#161622"/>
  </g>

  <!-- Bottom landing -->
  <rect x="100" y="540" width="600" height="60" fill="#0e0e18"/>

  <!-- Metal railing — left side -->
  <line x1="200" y1="50" x2="155" y2="280" stroke="#4a4a5a" stroke-width="3"/>
  <line x1="155" y1="280" x2="155" y2="330" stroke="#4a4a5a" stroke-width="3"/>
  <line x1="155" y1="330" x2="125" y2="540" stroke="#4a4a5a" stroke-width="3"/>
  <!-- Railing posts left -->
  <line x1="190" y1="90" x2="190" y2="108" stroke="#4a4a5a" stroke-width="2"/>
  <line x1="178" y1="150" x2="178" y2="168" stroke="#4a4a5a" stroke-width="2"/>
  <line x1="168" y1="215" x2="168" y2="233" stroke="#4a4a5a" stroke-width="2"/>
  <line x1="148" y1="370" x2="148" y2="388" stroke="#4a4a5a" stroke-width="2"/>
  <line x1="140" y1="430" x2="140" y2="448" stroke="#4a4a5a" stroke-width="2"/>
  <line x1="132" y1="490" x2="132" y2="508" stroke="#4a4a5a" stroke-width="2"/>

  <!-- Metal railing — right side -->
  <line x1="600" y1="50" x2="645" y2="280" stroke="#4a4a5a" stroke-width="3"/>
  <line x1="645" y1="280" x2="645" y2="330" stroke="#4a4a5a" stroke-width="3"/>
  <line x1="645" y1="330" x2="675" y2="540" stroke="#4a4a5a" stroke-width="3"/>
  <!-- Railing posts right -->
  <line x1="610" y1="90" x2="610" y2="108" stroke="#4a4a5a" stroke-width="2"/>
  <line x1="622" y1="150" x2="622" y2="168" stroke="#4a4a5a" stroke-width="2"/>
  <line x1="632" y1="215" x2="632" y2="233" stroke="#4a4a5a" stroke-width="2"/>
  <line x1="652" y1="370" x2="652" y2="388" stroke="#4a4a5a" stroke-width="2"/>
  <line x1="660" y1="430" x2="660" y2="448" stroke="#4a4a5a" stroke-width="2"/>
  <line x1="668" y1="490" x2="668" y2="508" stroke="#4a4a5a" stroke-width="2"/>

  <!-- Emergency exit sign on wall -->
  <rect x="108" y="310" width="24" height="14" fill="#111"/>
  <rect x="110" y="312" width="20" height="10" fill="#22C55E" opacity="0.5" rx="1"/>
  <ellipse cx="120" cy="340" rx="18" ry="12" fill="url(#exitGlow)"/>

  <!-- THE DROPPED NOTEBOOK on a step (key narrative detail) -->
  <!-- Notebook body (open, face-down, fallen) -->
  <rect x="340" y="225" width="55" height="38" fill="#E8D8C8" rx="2" transform="rotate(-12 367 244)"/>
  <!-- Notebook cover (red) -->
  <rect x="340" y="225" width="28" height="38" fill="#C0392B" opacity="0.7" rx="2" transform="rotate(-12 354 244)"/>
  <!-- Spine -->
  <line x1="368" y1="224" x2="365" y2="262" stroke="#333" stroke-width="1.5" transform="rotate(-12 366 243)"/>
  <!-- Pages fanned out (it fell open) -->
  <rect x="368" y="227" width="25" height="35" fill="#F5F0E8" rx="1" transform="rotate(-8 380 244)"/>
  <rect x="370" y="229" width="24" height="33" fill="#FBF6EE" rx="1" transform="rotate(-5 382 245)"/>
  <!-- Written lines visible on page -->
  <line x1="374" y1="237" x2="390" y2="236" stroke="#4a6a9a" stroke-width="0.5" opacity="0.4" transform="rotate(-5 382 236)"/>
  <line x1="374" y1="242" x2="388" y2="241" stroke="#4a6a9a" stroke-width="0.5" opacity="0.3" transform="rotate(-5 381 241)"/>
  <line x1="374" y1="247" x2="386" y2="246" stroke="#4a6a9a" stroke-width="0.5" opacity="0.3" transform="rotate(-5 380 246)"/>
  <!-- Pen that rolled out -->
  <rect x="405" y="240" width="35" height="3" fill="#1E40AF" rx="1" transform="rotate(25 422 241)"/>
  <polygon points="440,247 445,249 440,251" fill="#888" transform="rotate(25 442 249)"/>
  <!-- Shadow under notebook -->
  <ellipse cx="370" cy="248" rx="35" ry="4" fill="#0a0a15" opacity="0.4"/>

  <!-- Scuff marks on steps (someone ran) -->
  <path d="M300 190 L320 188" stroke="#2a2a2a" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <path d="M420 370 L445 367" stroke="#2a2a2a" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <path d="M350 415 L375 413" stroke="#2a2a2a" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>

  <!-- Graffiti tag on wall (small) -->
  <text x="660" y="200" font-family="sans-serif" font-size="11" fill="#555" opacity="0.15" transform="rotate(90 660 200)">BLW</text>

  <!-- Wall crack -->
  <path d="M620 80 L625 120 L618 160" fill="none" stroke="#222230" stroke-width="0.8" opacity="0.5"/>

  <!-- Gum stuck on railing -->
  <circle cx="620" cy="165" r="3" fill="#e8a0a0" opacity="0.2"/>

  <!-- Shadow of railing on steps (from fluorescent light) -->
  <g opacity="0.08">
    <line x1="200" y1="100" x2="210" y2="140" stroke="#000" stroke-width="4"/>
    <line x1="205" y1="100" x2="215" y2="140" stroke="#000" stroke-width="4"/>
    <line x1="600" y1="100" x2="590" y2="140" stroke="#000" stroke-width="4"/>
  </g>

  <!-- Viewer's shadow at bottom -->
  <ellipse cx="400" cy="565" rx="60" ry="12" fill="#000" opacity="0.2"/>
</svg>