<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="nightSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="60%" stop-color="#141428"/>
      <stop offset="100%" stop-color="#1a1a30"/>
    </linearGradient>
    <radialGradient id="shelterLight" cx="0.5" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="#FFE4A0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFE4A0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="adGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Night sky -->
  <rect width="800" height="600" fill="url(#nightSky)"/>

  <!-- Stars -->
  <circle cx="80" cy="30" r="1" fill="white" opacity="0.5"/>
  <circle cx="200" cy="55" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="350" cy="20" r="1.2" fill="white" opacity="0.4"/>
  <circle cx="520" cy="45" r="0.9" fill="white" opacity="0.7"/>
  <circle cx="680" cy="30" r="1.1" fill="white" opacity="0.3"/>
  <circle cx="750" cy="70" r="0.7" fill="white" opacity="0.5"/>
  <circle cx="440" cy="65" r="1" fill="white" opacity="0.4"/>

  <!-- Distant buildings silhouette -->
  <rect x="0" y="200" width="80" height="400" fill="#111120"/>
  <rect x="60" y="240" width="60" height="360" fill="#0d0d1a"/>
  <rect x="700" y="180" width="100" height="420" fill="#111120"/>
  <rect x="680" y="220" width="50" height="380" fill="#0d0d1a"/>
  <!-- Distant lit windows -->
  <rect x="15" y="230" width="8" height="10" fill="#FFE4A0" opacity="0.15" rx="1"/>
  <rect x="40" y="280" width="8" height="10" fill="#87CEEB" opacity="0.1" rx="1"/>
  <rect x="715" y="240" width="8" height="10" fill="#FFE4A0" opacity="0.12" rx="1"/>
  <rect x="740" y="300" width="8" height="10" fill="#FFE4A0" opacity="0.08" rx="1"/>

  <!-- Road -->
  <rect x="0" y="420" width="800" height="180" fill="#1e1e2a"/>
  <!-- Sidewalk -->
  <rect x="0" y="400" width="800" height="25" fill="#2a2a3a"/>
  <line x1="0" y1="425" x2="800" y2="425" stroke="#333345" stroke-width="1"/>
  <!-- Road markings -->
  <rect x="100" y="500" width="40" height="4" fill="#555" opacity="0.3" rx="1"/>
  <rect x="250" y="500" width="40" height="4" fill="#555" opacity="0.3" rx="1"/>
  <rect x="400" y="500" width="40" height="4" fill="#555" opacity="0.3" rx="1"/>
  <rect x="550" y="500" width="40" height="4" fill="#555" opacity="0.3" rx="1"/>
  <rect x="700" y="500" width="40" height="4" fill="#555" opacity="0.3" rx="1"/>

  <!-- BUS SHELTER structure -->
  <!-- Roof -->
  <rect x="200" y="260" width="400" height="8" fill="#444" rx="2"/>
  <!-- Left pillar -->
  <rect x="205" y="268" width="6" height="140" fill="#444"/>
  <!-- Right pillar -->
  <rect x="589" y="268" width="6" height="140" fill="#444"/>
  <!-- Back panel (glass) -->
  <rect x="211" y="270" width="378" height="130" fill="#1a1a2e" opacity="0.6"/>
  <rect x="211" y="270" width="378" height="130" fill="none" stroke="#555" stroke-width="1"/>
  <!-- Glass reflection -->
  <line x1="250" y1="270" x2="230" y2="400" stroke="#3a3a5a" stroke-width="0.5" opacity="0.4"/>
  <line x1="420" y1="270" x2="400" y2="400" stroke="#3a3a5a" stroke-width="0.5" opacity="0.4"/>

  <!-- Shelter light -->
  <rect x="380" y="268" width="40" height="5" fill="#FFE4A0" opacity="0.4" rx="1"/>
  <ellipse cx="400" cy="350" rx="150" ry="80" fill="url(#shelterLight)"/>

  <!-- Ad panel on shelter -->
  <rect x="440" y="285" width="130" height="95" fill="#1a2040" rx="2"/>
  <rect x="445" y="290" width="120" height="85" fill="#1a2545" rx="1"/>
  <ellipse cx="505" cy="335" rx="80" ry="50" fill="url(#adGlow)"/>
  <!-- Ad text (movie poster feel) -->
  <text x="505" y="325" font-family="sans-serif" font-weight="bold" font-size="11" fill="#5588CC" opacity="0.5" text-anchor="middle">SAISON 2</text>
  <text x="505" y="345" font-family="sans-serif" font-size="7" fill="#4477AA" opacity="0.4" text-anchor="middle">BIENTÔT</text>

  <!-- Bus sign -->
  <rect x="215" y="275" width="50" height="22" fill="#1E40AF" rx="3"/>
  <text x="240" y="291" font-family="sans-serif" font-weight="bold" font-size="12" fill="white" opacity="0.8" text-anchor="middle">BUS</text>
  <!-- Route number -->
  <rect x="215" y="300" width="50" height="18" fill="#222" rx="2"/>
  <text x="240" y="314" font-family="sans-serif" font-size="11" fill="#FFE4A0" opacity="0.6" text-anchor="middle">147</text>

  <!-- Bench in shelter -->
  <rect x="250" y="385" width="300" height="5" fill="#555" rx="1"/>
  <rect x="260" y="390" width="4" height="18" fill="#555"/>
  <rect x="540" y="390" width="4" height="18" fill="#555"/>

  <!-- PERSON 1 — sitting left side, hunched, hood up, looking at phone -->
  <!-- Body -->
  <path d="M310 340 Q320 330 330 340 L335 380 L305 380 Z" fill="#1a1a28"/>
  <!-- Hood -->
  <path d="M308 340 Q320 325 332 340 Q325 332 320 332 Q315 332 308 340 Z" fill="#1a1a28"/>
  <!-- Head inside hood -->
  <circle cx="320" cy="340" r="10" fill="#111118"/>
  <!-- Phone glow -->
  <rect x="312" y="360" width="7" height="11" fill="#222" rx="1"/>
  <rect x="313" y="361" width="5" height="8" fill="#3B82F6" opacity="0.35" rx="1"/>
  <!-- Phone light on face -->
  <circle cx="320" cy="345" r="6" fill="#3B82F6" opacity="0.04"/>
  <!-- Legs -->
  <rect x="310" y="380" width="8" height="25" fill="#1a1a28"/>
  <rect x="325" y="380" width="8" height="25" fill="#1a1a28"/>
  <!-- Shoes -->
  <rect x="308" y="403" width="12" height="5" fill="#222" rx="2"/>
  <rect x="323" y="403" width="12" height="5" fill="#222" rx="2"/>

  <!-- PERSON 2 — sitting right side, back to Person 1, earbuds in, looking away -->
  <!-- Body -->
  <path d="M480 338 Q490 328 500 338 L505 380 L475 380 Z" fill="#2a1a28"/>
  <!-- Head -->
  <circle cx="490" cy="335" r="11" fill="#111118"/>
  <!-- Hair (short, textured) -->
  <ellipse cx="490" cy="329" rx="12" ry="7" fill="#111118"/>
  <!-- Earbud wire -->
  <path d="M498 340 Q505 350 500 365" fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <circle cx="498" cy="339" r="2" fill="white" opacity="0.4"/>
  <!-- Arms crossed -->
  <path d="M478 355 Q470 360 472 370 L480 368 Z" fill="#2a1a28"/>
  <path d="M502 355 Q510 360 508 370 L500 368 Z" fill="#2a1a28"/>
  <!-- Legs -->
  <rect x="480" y="380" width="8" height="25" fill="#2a1a28"/>
  <rect x="495" y="380" width="8" height="25" fill="#2a1a28"/>
  <!-- Shoes -->
  <rect x="478" y="403" width="12" height="5" fill="#333" rx="2"/>
  <rect x="493" y="403" width="12" height="5" fill="#333" rx="2"/>

  <!-- Gap between them (visual emphasis on the space/distance) -->
  <!-- Plastic bag on bench between them -->
  <path d="M410 378 Q415 368 420 378 Q418 374 410 378 Z" fill="#666" opacity="0.3"/>

  <!-- Puddle on ground reflecting shelter light -->
  <ellipse cx="400" cy="440" rx="50" ry="6" fill="#1a1a30"/>
  <ellipse cx="400" cy="440" rx="45" ry="4" fill="#222240" opacity="0.5"/>
  <rect x="385" y="438" width="15" height="4" fill="#FFE4A0" opacity="0.04" rx="1"/>

  <!-- Cigarette butt on ground -->
  <rect x="350" y="410" width="6" height="2" fill="#DDD" opacity="0.2" rx="1"/>

  <!-- Empty can -->
  <ellipse cx="560" cy="412" rx="6" ry="4" fill="#C0392B" opacity="0.2"/>
  <rect x="554" y="405" width="12" height="7" fill="#C0392B" opacity="0.15" rx="1"/>

  <!-- Street lamp (far left) -->
  <rect x="140" y="250" width="4" height="160" fill="#444"/>
  <ellipse cx="142" cy="248" rx="8" ry="5" fill="#FFE4A0" opacity="0.2"/>
  <circle cx="142" cy="246" r="4" fill="#FFE4A0" opacity="0.35"/>
  <!-- Lamp light cone -->
  <ellipse cx="142" cy="415" rx="40" ry="15" fill="#FFE4A0" opacity="0.05"/>

  <!-- Bus headlights approaching (far right) -->
  <circle cx="760" cy="470" r="8" fill="#FFE4A0" opacity="0.15"/>
  <circle cx="780" cy="470" r="8" fill="#FFE4A0" opacity="0.15"/>
  <!-- Light streaks -->
  <line x1="760" y1="470" x2="650" y2="480" stroke="#FFE4A0" stroke-width="2" opacity="0.05"/>
  <line x1="780" y1="470" x2="670" y2="485" stroke="#FFE4A0" stroke-width="2" opacity="0.05"/>

  <!-- Graffiti on shelter side -->
  <text x="596" y="360" font-family="sans-serif" font-size="10" fill="#EF4444" opacity="0.15" transform="rotate(90 596 360)">93</text>

  <!-- Timetable poster (faded) -->
  <rect x="215" y="325" width="40" height="55" fill="#222" rx="1"/>
  <rect x="218" y="328" width="34" height="48" fill="#2a2a3a" rx="1"/>
  <line x1="220" y1="340" x2="250" y2="340" stroke="#444" stroke-width="0.5"/>
  <line x1="220" y1="350" x2="250" y2="350" stroke="#444" stroke-width="0.5"/>
  <line x1="220" y1="360" x2="250" y2="360" stroke="#444" stroke-width="0.5"/>
</svg>