<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="nightsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1B2D"/>
      <stop offset="100%" stop-color="#1A2940"/>
    </linearGradient>
    <radialGradient id="lampLight" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFE4B5" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#FFE4B5" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFE4B5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampLight2" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFE4B5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFE4B5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Night sky -->
  <rect width="800" height="600" fill="url(#nightsky)"/>

  <!-- Stars -->
  <circle cx="100" cy="40" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="250" cy="70" r="1" fill="white" opacity="0.4"/>
  <circle cx="400" cy="30" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="550" cy="60" r="1" fill="white" opacity="0.3"/>
  <circle cx="700" cy="45" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="650" cy="80" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="180" cy="90" r="0.8" fill="white" opacity="0.25"/>
  <circle cx="480" cy="50" r="1" fill="white" opacity="0.35"/>

  <!-- Moon -->
  <circle cx="680" cy="80" r="20" fill="#E8E0D0" opacity="0.8"/>
  <circle cx="688" cy="75" r="18" fill="url(#nightsky)"/>

  <!-- Buildings far background -->
  <rect x="0" y="180" width="50" height="220" fill="#151F30"/>
  <rect x="45" y="200" width="40" height="200" fill="#1A2535"/>
  <rect x="720" y="190" width="40" height="210" fill="#151F30"/>
  <rect x="755" y="170" width="45" height="230" fill="#1A2535"/>
  <!-- Building windows (far) -->
  <rect x="12" y="210" width="5" height="6" fill="#E8C87A" opacity="0.3"/>
  <rect x="30" y="240" width="5" height="6" fill="#4A7AAA" opacity="0.2"/>
  <rect x="55" y="230" width="5" height="6" fill="#E8C87A" opacity="0.2"/>
  <rect x="730" y="220" width="5" height="6" fill="#E8C87A" opacity="0.25"/>
  <rect x="765" y="200" width="5" height="6" fill="#4A7AAA" opacity="0.3"/>

  <!-- Road / street -->
  <rect x="0" y="400" width="800" height="200" fill="#2A2A35"/>
  <!-- Sidewalks -->
  <rect x="0" y="395" width="800" height="8" fill="#3A3A45"/>
  <rect x="0" y="530" width="800" height="8" fill="#3A3A45"/>
  <!-- Road markings -->
  <rect x="100" y="468" width="40" height="4" fill="#F1C40F" opacity="0.3" rx="1"/>
  <rect x="220" y="468" width="40" height="4" fill="#F1C40F" opacity="0.3" rx="1"/>
  <rect x="340" y="468" width="40" height="4" fill="#F1C40F" opacity="0.3" rx="1"/>
  <rect x="460" y="468" width="40" height="4" fill="#F1C40F" opacity="0.3" rx="1"/>
  <rect x="580" y="468" width="40" height="4" fill="#F1C40F" opacity="0.3" rx="1"/>
  <rect x="700" y="468" width="40" height="4" fill="#F1C40F" opacity="0.3" rx="1"/>

  <!-- Crosswalk -->
  <rect x="355" y="395" width="12" height="140" fill="white" opacity="0.15"/>
  <rect x="375" y="395" width="12" height="140" fill="white" opacity="0.15"/>
  <rect x="395" y="395" width="12" height="140" fill="white" opacity="0.15"/>
  <rect x="415" y="395" width="12" height="140" fill="white" opacity="0.15"/>
  <rect x="435" y="395" width="12" height="140" fill="white" opacity="0.15"/>

  <!-- Lamp post LEFT — main light source -->
  <rect x="195" y="200" width="5" height="200" fill="#555"/>
  <path d="M185 200 Q198 190 210 200" fill="none" stroke="#555" stroke-width="3"/>
  <ellipse cx="198" cy="195" rx="8" ry="5" fill="#FFE4B5" opacity="0.9"/>
  <!-- Light cone -->
  <circle cx="198" cy="400" r="120" fill="url(#lampLight)"/>

  <!-- Lamp post RIGHT -->
  <rect x="595" y="210" width="5" height="190" fill="#555"/>
  <path d="M585 210 Q598 200 610 210" fill="none" stroke="#555" stroke-width="3"/>
  <ellipse cx="598" cy="205" rx="7" ry="4" fill="#FFE4B5" opacity="0.7"/>
  <circle cx="598" cy="400" r="100" fill="url(#lampLight2)"/>

  <!-- ====== THE SCENE — ACCIDENT/INCIDENT ====== -->

  <!-- BIKE FALLEN on crosswalk -->
  <!-- Wheels -->
  <circle cx="380" cy="430" r="16" fill="none" stroke="#666" stroke-width="2.5"/>
  <circle cx="420" cy="440" r="16" fill="none" stroke="#666" stroke-width="2.5"/>
  <!-- Frame -->
  <line x1="380" y1="430" x2="400" y2="418" stroke="#3498DB" stroke-width="3"/>
  <line x1="420" y1="440" x2="400" y2="418" stroke="#3498DB" stroke-width="3"/>
  <line x1="400" y1="418" x2="395" y2="408" stroke="#3498DB" stroke-width="3"/>
  <!-- Handlebars bent -->
  <line x1="390" y1="405" x2="410" y2="412" stroke="#666" stroke-width="2"/>
  <!-- Pedal -->
  <rect x="395" y="435" width="8" height="3" fill="#666" rx="1"/>

  <!-- SNEAKER lost on road -->
  <rect x="470" y="445" width="18" height="8" fill="white" rx="3" transform="rotate(25 479 449)"/>
  <rect x="470" y="449" width="6" height="4" fill="#E74C3C" rx="1" transform="rotate(25 473 451)"/>

  <!-- CAP on ground -->
  <ellipse cx="340" cy="448" rx="10" ry="4" fill="#2C3E50"/>
  <rect x="332" y="444" width="16" height="4" fill="#2C3E50" rx="1"/>

  <!-- Scratch marks / skid on road -->
  <path d="M350 435 Q380 428 420 440" fill="none" stroke="#444" stroke-width="2" opacity="0.4"/>

  <!-- Broken phone screen on ground (lit up) -->
  <rect x="435" y="432" width="10" height="16" fill="#222" rx="2" transform="rotate(-30 440 440)"/>
  <rect x="436" y="433" width="8" height="14" fill="#4488FF" opacity="0.3" rx="1" transform="rotate(-30 440 440)"/>
  <!-- Crack lines -->
  <line x1="437" y1="435" x2="443" y2="445" stroke="white" stroke-width="0.3" opacity="0.5" transform="rotate(-30 440 440)"/>

  <!-- === PERSON 1 — Kid sitting on ground, holding knee (hurt) === -->
  <circle cx="320" cy="408" r="8" fill="#4A3728"/>
  <!-- Hair -->
  <ellipse cx="320" cy="404" rx="8" ry="4" fill="#222"/>
  <!-- Body sitting -->
  <rect x="312" y="416" width="16" height="16" fill="#E74C3C" rx="4"/>
  <!-- Legs bent (sitting) -->
  <path d="M314 432 Q310 440 315 448" fill="none" stroke="#2C3E50" stroke-width="5" stroke-linecap="round"/>
  <path d="M326 432 Q330 440 325 448" fill="none" stroke="#2C3E50" stroke-width="5" stroke-linecap="round"/>
  <!-- Hand on knee (hurt) -->
  <circle cx="310" cy="440" r="3" fill="#4A3728"/>
  <!-- Shoes -->
  <rect x="312" y="446" width="8" height="4" fill="#3498DB" rx="2"/>
  <rect x="323" y="446" width="8" height="4" fill="#3498DB" rx="2"/>
  <!-- Expression — mouth open (pain/shock) -->
  <ellipse cx="320" cy="413" rx="2" ry="1.5" fill="#222"/>

  <!-- === PERSON 2 — Standing nearby, hand on head (worried) === -->
  <circle cx="280" cy="385" r="8" fill="#3A2818"/>
  <!-- Body -->
  <rect x="272" y="393" width="16" height="22" fill="#27AE60" rx="5"/>
  <!-- Legs -->
  <rect x="275" y="413" width="5" height="16" fill="#2C3E50" rx="1"/>
  <rect x="282" y="413" width="5" height="16" fill="#2C3E50" rx="1"/>
  <rect x="273" y="427" width="8" height="3" fill="white" rx="1"/>
  <rect x="281" y="427" width="8" height="3" fill="white" rx="1"/>
  <!-- Hand on head gesture -->
  <path d="M272 398 Q264 390 268 382" fill="none" stroke="#3A2818" stroke-width="4" stroke-linecap="round"/>
  <circle cx="268" cy="381" r="3" fill="#3A2818"/>
  <!-- Other arm reaching toward fallen person -->
  <path d="M288 400 Q300 405 308 410" fill="none" stroke="#3A2818" stroke-width="3" stroke-linecap="round"/>

  <!-- === PERSON 3 — Running AWAY in distance (leaving the scene) === -->
  <circle cx="570" cy="380" r="6" fill="#2C2C2C"/>
  <!-- Body leaning forward (running) -->
  <rect x="565" y="386" width="10" height="16" fill="#222" rx="3" transform="rotate(-10 570 394)"/>
  <!-- Running legs -->
  <path d="M567 400 Q560 410 558 416" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <path d="M573 400 Q580 408 584 414" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <!-- Dark hoodie pulled up -->
  <path d="M564 382 Q567 378 570 376 Q573 378 576 382" fill="#222"/>

  <!-- === CAR stopped — headlights on === -->
  <rect x="120" y="425" width="55" height="25" fill="#444" rx="5"/>
  <rect x="118" y="430" width="8" height="15" fill="#555" rx="3"/>
  <!-- Windshield -->
  <rect x="130" y="427" width="20" height="12" fill="#2A3545" rx="2" opacity="0.7"/>
  <!-- Headlights -->
  <circle cx="175" cy="438" r="4" fill="#FFE4B5" opacity="0.8"/>
  <circle cx="175" cy="438" r="8" fill="#FFE4B5" opacity="0.15"/>
  <!-- Tail lights -->
  <circle cx="120" cy="438" r="3" fill="#E74C3C" opacity="0.6"/>
  <!-- Wheels -->
  <circle cx="135" cy="452" r="5" fill="#222"/>
  <circle cx="162" cy="452" r="5" fill="#222"/>
  <!-- Driver silhouette getting out — door open -->
  <rect x="145" y="420" width="8" height="12" fill="#333" rx="1" transform="rotate(-20 149 426)"/>
  <!-- Person getting out -->
  <circle cx="160" cy="412" r="6" fill="#555"/>
  <rect x="155" y="418" width="10" height="14" fill="#666" rx="3"/>

  <!-- Puddle reflecting headlights -->
  <ellipse cx="250" cy="460" rx="30" ry="5" fill="#FFE4B5" opacity="0.06"/>
  <ellipse cx="200" cy="455" rx="15" ry="3" fill="#FFE4B5" opacity="0.04"/>

  <!-- Traffic light (red) -->
  <rect x="490" y="340" width="8" height="24" fill="#333" rx="2"/>
  <rect x="492" y="340" width="12" height="4" fill="#333"/>
  <circle cx="494" cy="348" r="3" fill="#E74C3C" opacity="0.8"/>
  <circle cx="494" cy="355" r="3" fill="#333"/>
  <circle cx="494" cy="362" r="3" fill="#333"/>
  <!-- Pole -->
  <rect x="492" y="364" width="4" height="36" fill="#444"/>

  <!-- Store/shop front (closed, shutters down) -->
  <rect x="620" y="330" width="70" height="70" fill="#1E2535"/>
  <rect x="625" y="335" width="60" height="55" fill="#252F40" rx="1"/>
  <!-- Shutter lines -->
  <line x1="625" y1="345" x2="685" y2="345" stroke="#2A3545" stroke-width="1"/>
  <line x1="625" y1="355" x2="685" y2="355" stroke="#2A3545" stroke-width="1"/>
  <line x1="625" y1="365" x2="685" y2="365" stroke="#2A3545" stroke-width="1"/>
  <line x1="625" y1="375" x2="685" y2="375" stroke="#2A3545" stroke-width="1"/>
  <!-- Sign above -->
  <rect x="630" y="320" width="50" height="10" fill="#1A2030"/>
  <text x="638" y="328" font-family="Arial" font-size="6" fill="#888" opacity="0.4">TABAC</text>

  <!-- Newspaper/tract on ground blown by wind -->
  <rect x="500" y="455" width="15" height="10" fill="#DDD" opacity="0.2" rx="1" transform="rotate(15 507 460)"/>

  <!-- Fire hydrant -->
  <rect x="155" y="380" width="8" height="15" fill="#C0392B" rx="2"/>
  <rect x="152" y="385" width="14" height="3" fill="#E74C3C" rx="1"/>
  <ellipse cx="159" cy="380" rx="5" ry="2" fill="#C0392B"/>

  <!-- Evidence of the story — scattered grocery bag -->
  <path d="M350 460 Q345 455 350 450 Q360 445 365 460 Q355 465 350 460" fill="white" opacity="0.2"/>
  <!-- Apple rolled away -->
  <circle cx="375" cy="462" r="4" fill="#27AE60" opacity="0.5"/>
  <!-- Another item -->
  <rect x="335" y="460" width="8" height="5" fill="#F39C12" opacity="0.3" rx="1"/>
</svg>