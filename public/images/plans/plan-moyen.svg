<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg-blur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4B599"/>
      <stop offset="100%" stop-color="#A89880"/>
    </linearGradient>
    <filter id="blur-bg">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="frame-m">
      <rect x="20" y="20" width="760" height="320" rx="12"/>
    </clipPath>
  </defs>

  <!-- Frame background -->
  <rect width="800" height="400" rx="16" fill="#1a1a2e"/>

  <g clip-path="url(#frame-m)">
    <!-- Blurred background - cafeteria/table area -->
    <rect x="20" y="20" width="760" height="320" fill="url(#bg-blur)"/>

    <!-- Blurred background elements -->
    <g filter="url(#blur-bg)" opacity="0.4">
      <rect x="50" y="40" width="700" height="280" fill="#B8A88A"/>
      <rect x="100" y="100" width="600" height="8" rx="2" fill="#8B7355"/>
      <rect x="200" y="200" width="400" height="8" rx="2" fill="#8B7355"/>
      <circle cx="150" cy="150" r="30" fill="#7A9E7A"/>
      <circle cx="650" cy="130" r="25" fill="#7A9E7A"/>
    </g>

    <!-- Table surface -->
    <path d="M150 260 L650 260 L700 340 L100 340 Z" fill="#8B6914" opacity="0.6"/>
    <rect x="180" y="240" width="440" height="8" rx="2" fill="#A0855C" opacity="0.8"/>

    <!-- Books/items on table -->
    <rect x="250" y="228" width="40" height="12" rx="2" fill="#3B82F6" opacity="0.5"/>
    <rect x="300" y="225" width="35" height="15" rx="2" fill="#EF4444" opacity="0.4"/>
    <circle cx="520" cy="232" r="8" fill="#F59E0B" opacity="0.4"/>

    <!-- Student 1 (left) - waist up, gesturing -->
    <!-- Body -->
    <path d="M270 340 L270 210 Q270 185 290 180 L310 180 Q330 185 330 210 L330 340" fill="#3B82F6"/>
    <!-- Neck -->
    <rect x="290" y="165" width="20" height="18" rx="4" fill="#D4A574"/>
    <!-- Head -->
    <ellipse cx="300" cy="150" rx="25" ry="28" fill="#D4A574"/>
    <!-- Hair -->
    <path d="M275 145 Q275 120 300 118 Q325 120 325 145" fill="#3D2B1F"/>
    <!-- Eyes -->
    <circle cx="290" cy="148" r="3" fill="#2D1B0E"/>
    <circle cx="310" cy="148" r="3" fill="#2D1B0E"/>
    <!-- Mouth (talking) -->
    <ellipse cx="300" cy="162" rx="6" ry="3" fill="#C4775C"/>
    <!-- Left arm gesturing up -->
    <path d="M270 210 L240 180 L235 165" stroke="#D4A574" stroke-width="10" stroke-linecap="round" fill="none"/>
    <!-- Right arm on table -->
    <path d="M330 210 L360 240" stroke="#D4A574" stroke-width="10" stroke-linecap="round" fill="none"/>

    <!-- Student 2 (right) - waist up, leaning in -->
    <!-- Body -->
    <path d="M470 340 L470 215 Q470 190 490 185 L510 185 Q530 190 530 215 L530 340" fill="#10B981"/>
    <!-- Neck -->
    <rect x="490" y="168" width="20" height="18" rx="4" fill="#C68642"/>
    <!-- Head (slightly tilted) -->
    <ellipse cx="500" cy="153" rx="25" ry="28" fill="#C68642" transform="rotate(-5 500 153)"/>
    <!-- Hair -->
    <path d="M475 148 Q475 120 500 115 Q525 120 528 148" fill="#1A0F0A"/>
    <path d="M475 148 Q470 140 475 130" fill="#1A0F0A"/>
    <!-- Eyes -->
    <circle cx="490" cy="150" r="3" fill="#2D1B0E"/>
    <circle cx="510" cy="149" r="3" fill="#2D1B0E"/>
    <!-- Slight smile -->
    <path d="M493 165 Q500 170 507 165" stroke="#8B5E3C" stroke-width="1.5" fill="none"/>
    <!-- Both arms resting on table -->
    <path d="M470 215 L450 240" stroke="#C68642" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M530 215 L545 240" stroke="#C68642" stroke-width="10" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Viewfinder frame -->
  <rect x="20" y="20" width="760" height="320" rx="12" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>

  <!-- Corner marks -->
  <path d="M35 30 L35 40" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M30 35 L40 35" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M765 30 L765 40" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M760 35 L770 35" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M35 330 L35 320" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M30 325 L40 325" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M765 330 L765 320" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M760 325 L770 325" stroke="white" stroke-width="1.5" opacity="0.5"/>

  <!-- Caption -->
  <rect x="200" y="355" width="400" height="32" rx="8" fill="white" opacity="0.08"/>
  <text x="400" y="376" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" opacity="0.7">PLAN MOYEN — On voit ce que font les personnages</text>
</svg>