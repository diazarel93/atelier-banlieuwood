<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#B8DCF0"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4C5A9"/>
      <stop offset="100%" stop-color="#C4B599"/>
    </linearGradient>
    <clipPath id="frame">
      <rect x="20" y="20" width="760" height="320" rx="12"/>
    </clipPath>
  </defs>

  <!-- Frame background -->
  <rect width="800" height="400" rx="16" fill="#1a1a2e"/>

  <!-- Viewfinder frame -->
  <g clip-path="url(#frame)">
    <!-- Sky -->
    <rect x="20" y="20" width="760" height="200" fill="url(#sky)"/>
    <!-- Ground / courtyard -->
    <rect x="20" y="180" width="760" height="160" fill="url(#ground)"/>

    <!-- Left building -->
    <rect x="20" y="60" width="180" height="280" fill="#8B7D6B" opacity="0.9"/>
    <rect x="40" y="80" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.6"/>
    <rect x="85" y="80" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.6"/>
    <rect x="130" y="80" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.6"/>
    <rect x="40" y="140" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.6"/>
    <rect x="85" y="140" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.6"/>
    <rect x="130" y="140" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.6"/>
    <rect x="40" y="200" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.5"/>
    <rect x="85" y="200" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.5"/>
    <rect x="130" y="200" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.5"/>

    <!-- Right building -->
    <rect x="600" y="80" width="180" height="260" fill="#7D6B5D" opacity="0.9"/>
    <rect x="620" y="100" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.6"/>
    <rect x="665" y="100" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.6"/>
    <rect x="710" y="100" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.6"/>
    <rect x="620" y="160" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.6"/>
    <rect x="665" y="160" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.6"/>
    <rect x="710" y="160" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.6"/>
    <rect x="620" y="220" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.5"/>
    <rect x="665" y="220" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.5"/>
    <rect x="710" y="220" width="30" height="40" rx="2" fill="#A0D2DB" opacity="0.5"/>

    <!-- Tree left -->
    <circle cx="240" cy="160" r="30" fill="#6B8E6B" opacity="0.7"/>
    <circle cx="260" cy="150" r="25" fill="#7A9E7A" opacity="0.7"/>
    <rect x="247" y="175" width="6" height="30" fill="#8B7355"/>

    <!-- Tree right -->
    <circle cx="560" cy="155" r="28" fill="#6B8E6B" opacity="0.7"/>
    <circle cx="545" cy="148" r="22" fill="#7A9E7A" opacity="0.7"/>
    <rect x="552" y="170" width="6" height="28" fill="#8B7355"/>

    <!-- Small student figures scattered -->
    <!-- Student 1 -->
    <circle cx="330" cy="230" r="4" fill="#5D4E37"/>
    <rect x="327" y="234" width="6" height="12" rx="2" fill="#3B82F6"/>
    <!-- Student 2 -->
    <circle cx="380" cy="250" r="4" fill="#5D4E37"/>
    <rect x="377" y="254" width="6" height="12" rx="2" fill="#EF4444"/>
    <!-- Student 3 -->
    <circle cx="420" cy="240" r="4" fill="#5D4E37"/>
    <rect x="417" y="244" width="6" height="12" rx="2" fill="#10B981"/>
    <!-- Student 4 -->
    <circle cx="470" cy="260" r="4" fill="#5D4E37"/>
    <rect x="467" y="264" width="6" height="12" rx="2" fill="#F59E0B"/>
    <!-- Student 5 -->
    <circle cx="350" cy="270" r="4" fill="#5D4E37"/>
    <rect x="347" y="274" width="6" height="12" rx="2" fill="#8B5CF6"/>
    <!-- Student 6 -->
    <circle cx="440" cy="280" r="4" fill="#5D4E37"/>
    <rect x="437" y="284" width="6" height="12" rx="2" fill="#3B82F6"/>
    <!-- Student pair walking -->
    <circle cx="500" cy="230" r="4" fill="#5D4E37"/>
    <rect x="497" y="234" width="6" height="12" rx="2" fill="#EC4899"/>
    <circle cx="510" cy="232" r="4" fill="#5D4E37"/>
    <rect x="507" y="236" width="6" height="12" rx="2" fill="#14B8A6"/>

    <!-- Bench -->
    <rect x="290" y="290" width="40" height="4" rx="1" fill="#8B7355"/>
    <rect x="294" y="294" width="3" height="8" fill="#8B7355"/>
    <rect x="323" y="294" width="3" height="8" fill="#8B7355"/>
  </g>

  <!-- Viewfinder frame border -->
  <rect x="20" y="20" width="760" height="320" rx="12" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>

  <!-- Corner marks (film framing) -->
  <path d="M35 30 L35 40" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M30 35 L40 35" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M765 30 L765 40" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M760 35 L770 35" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M35 330 L35 320" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M30 325 L40 325" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M765 330 L765 320" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M760 325 L770 325" stroke="white" stroke-width="1.5" opacity="0.5"/>

  <!-- Caption area -->
  <rect x="200" y="355" width="400" height="32" rx="8" fill="white" opacity="0.08"/>
  <text x="400" y="376" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" opacity="0.7">PLAN LARGE — On voit tout le lieu</text>
</svg>