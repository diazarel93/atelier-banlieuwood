<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="stairDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a25"/>
      <stop offset="100%" stop-color="#141420"/>
    </linearGradient>
    <linearGradient id="sunsetThrough" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4a460"/>
      <stop offset="30%" stop-color="#e8956a"/>
      <stop offset="60%" stop-color="#c47a8a"/>
      <stop offset="100%" stop-color="#4a3a6a"/>
    </linearGradient>
    <radialGradient id="doorGlow" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#FF6B35" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lightSpill" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="exitSign" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark stairwell interior -->
  <rect width="800" height="600" fill="url(#stairDark)"/>

  <!-- Walls of top stairwell landing -->
  <rect x="60" y="0" width="680" height="600" fill="#161620"/>

  <!-- Left wall -->
  <rect x="60" y="0" width="15" height="600" fill="#1e1e2a"/>
  <!-- Right wall -->
  <rect x="725" y="0" width="15" height="600" fill="#1e1e2a"/>

  <!-- Wall paint two-tone -->
  <rect x="75" y="300" width="650" height="300" fill="#131320" opacity="0.3"/>
  <line x1="75" y1="300" x2="725" y2="300" stroke="#222235" stroke-width="2"/>

  <!-- Last flight of stairs (coming up from below) -->
  <rect x="120" y="430" width="560" height="22" fill="#12121c"/>
  <rect x="120" y="427" width="560" height="5" fill="#181824"/>

  <rect x="140" y="470" width="520" height="24" fill="#10101a"/>
  <rect x="140" y="467" width="520" height="5" fill="#161622"/>

  <rect x="160" y="515" width="480" height="25" fill="#0e0e18"/>
  <rect x="160" y="512" width="480" height="5" fill="#141420"/>

  <!-- Bottom landing -->
  <rect x="180" y="550" width="440" height="50" fill="#0c0c16"/>

  <!-- Railing going up to the door -->
  <line x1="150" y1="420" x2="200" y2="560" stroke="#4a4a5a" stroke-width="3"/>
  <line x1="650" y1="420" x2="600" y2="560" stroke="#4a4a5a" stroke-width="3"/>
  <!-- Railing posts -->
  <line x1="160" y1="445" x2="160" y2="462" stroke="#4a4a5a" stroke-width="2"/>
  <line x1="170" y1="475" x2="170" y2="492" stroke="#4a4a5a" stroke-width="2"/>
  <line x1="180" y1="510" x2="180" y2="527" stroke="#4a4a5a" stroke-width="2"/>
  <line x1="640" y1="445" x2="640" y2="462" stroke="#4a4a5a" stroke-width="2"/>
  <line x1="630" y1="475" x2="630" y2="492" stroke="#4a4a5a" stroke-width="2"/>
  <line x1="620" y1="510" x2="620" y2="527" stroke="#4a4a5a" stroke-width="2"/>

  <!-- Top landing platform (in front of the door) -->
  <rect x="100" y="380" width="600" height="50" fill="#18181e"/>
  <rect x="100" y="378" width="600" height="4" fill="#1e1e2a"/>

  <!-- THE DOOR TO THE ROOF — ajar, sunset light pouring through -->
  <!-- Door frame -->
  <rect x="250" y="50" width="300" height="330" fill="#2a2a3a" rx="3"/>

  <!-- Through the gap: sunset sky visible -->
  <!-- The door is ajar, so we see a wedge of sky -->
  <polygon points="280,55 490,55 490,375 280,375" fill="url(#sunsetThrough)"/>

  <!-- Sun glow through gap -->
  <polygon points="280,55 490,55 490,375 280,375" fill="url(#doorGlow)"/>

  <!-- Outside visible through gap: rooftop details -->
  <!-- Rooftop surface -->
  <rect x="280" y="300" width="210" height="75" fill="#4a4a5a" opacity="0.5"/>
  <!-- Rooftop railing/parapet -->
  <rect x="280" y="280" width="210" height="5" fill="#555" opacity="0.4"/>
  <!-- Ventilation units on roof -->
  <rect x="310" y="260" width="25" height="25" fill="#555" opacity="0.3" rx="2"/>
  <rect x="420" y="265" width="20" height="20" fill="#555" opacity="0.25" rx="2"/>
  <!-- Antenna -->
  <line x1="460" y1="200" x2="460" y2="270" stroke="#555" stroke-width="1.5" opacity="0.3"/>
  <line x1="450" y1="215" x2="470" y2="215" stroke="#555" stroke-width="1" opacity="0.25"/>

  <!-- Distant cityscape visible through gap -->
  <rect x="300" y="180" width="40" height="100" fill="#3a3545" opacity="0.4"/>
  <rect x="350" y="200" width="30" height="80" fill="#3a3545" opacity="0.35"/>
  <rect x="390" y="160" width="50" height="120" fill="#3a3545" opacity="0.3"/>
  <rect x="450" y="190" width="35" height="90" fill="#3a3545" opacity="0.3"/>
  <!-- Tiny lit windows on distant buildings -->
  <rect x="310" y="210" width="4" height="4" fill="#FFE4A0" opacity="0.15"/>
  <rect x="325" y="240" width="4" height="4" fill="#FFE4A0" opacity="0.1"/>
  <rect x="400" y="200" width="4" height="4" fill="#FFE4A0" opacity="0.12"/>
  <rect x="420" y="230" width="4" height="4" fill="#87CEEB" opacity="0.08"/>
  <rect x="460" y="220" width="4" height="4" fill="#FFE4A0" opacity="0.1"/>

  <!-- Clouds in the sunset -->
  <ellipse cx="380" cy="100" rx="50" ry="10" fill="#e8b090" opacity="0.3"/>
  <ellipse cx="440" cy="130" rx="35" ry="8" fill="#d8a080" opacity="0.25"/>

  <!-- THE DOOR itself (heavy metal fire door, partially open) -->
  <!-- Door surface (the one that's open, angled) -->
  <path d="M280,55 L250,55 L250,380 L280,375 Z" fill="#3a3a4a"/>
  <path d="M280,55 L260,58 L260,377 L280,375 Z" fill="#333345"/>
  <!-- Door thickness visible -->
  <rect x="250" y="55" width="10" height="325" fill="#444458"/>
  <!-- Push bar on door (fire exit style) -->
  <rect x="255" y="200" width="8" height="40" fill="#666" rx="2"/>
  <rect x="253" y="215" width="12" height="5" fill="#777" rx="1"/>

  <!-- Right side of door frame -->
  <rect x="490" y="50" width="60" height="335" fill="#2a2a3a"/>
  <!-- Door frame details -->
  <rect x="490" y="55" width="5" height="325" fill="#333345"/>

  <!-- INTERDIT sign on door (faded) -->
  <rect x="494" y="160" width="50" height="30" fill="#C0392B" opacity="0.15" rx="2"/>
  <text x="519" y="175" text-anchor="middle" font-size="7" fill="#FFF" opacity="0.1" font-family="sans-serif">ACCES</text>
  <text x="519" y="185" text-anchor="middle" font-size="7" fill="#FFF" opacity="0.1" font-family="sans-serif">INTERDIT</text>

  <!-- Light spilling from door onto landing floor -->
  <polygon points="280,375 490,375 550,430 200,430" fill="url(#lightSpill)"/>

  <!-- Warm light band on floor from gap -->
  <rect x="280" y="395" width="210" height="3" fill="#FFD700" opacity="0.05"/>

  <!-- Emergency exit sign above door -->
  <rect x="360" y="35" width="80" height="14" fill="#111"/>
  <rect x="363" y="37" width="74" height="10" fill="#22C55E" opacity="0.45" rx="1"/>
  <text x="400" y="45" text-anchor="middle" font-size="7" fill="#FFF" opacity="0.4" font-family="sans-serif">SORTIE</text>
  <ellipse cx="400" cy="60" rx="50" ry="20" fill="url(#exitSign)"/>

  <!-- Floor number on wall -->
  <text x="100" y="200" font-family="sans-serif" font-weight="bold" font-size="45" fill="#222235" opacity="0.3">4</text>

  <!-- Graffiti on wall near door -->
  <text x="560" y="260" font-family="sans-serif" font-size="10" fill="#555" opacity="0.12">SKY</text>

  <!-- Small window on landing wall -->
  <rect x="580" y="100" width="100" height="70" fill="#2a2a40" rx="2"/>
  <rect x="580" y="100" width="100" height="70" fill="none" stroke="#444" stroke-width="3"/>
  <line x1="630" y1="100" x2="630" y2="170" stroke="#444" stroke-width="2"/>
  <!-- Very faint sky through window -->
  <rect x="583" y="103" width="44" height="64" fill="#4a3a6a" opacity="0.1"/>
  <rect x="633" y="103" width="44" height="64" fill="#4a3a6a" opacity="0.08"/>

  <!-- Dust particles in the light beam -->
  <circle cx="350" cy="250" r="1" fill="#FFD700" opacity="0.2"/>
  <circle cx="400" cy="300" r="0.8" fill="#FFD700" opacity="0.15"/>
  <circle cx="320" cy="350" r="1.2" fill="#FFD700" opacity="0.12"/>
  <circle cx="450" cy="200" r="0.9" fill="#FFD700" opacity="0.1"/>
  <circle cx="380" cy="380" r="1.1" fill="#FFD700" opacity="0.1"/>

  <!-- Cigarette butt on landing (someone was here) -->
  <rect x="380" y="400" width="7" height="2" fill="#DDD" opacity="0.15" rx="1"/>
  <circle cx="387" cy="401" r="1.5" fill="#FF6B35" opacity="0.1"/>

  <!-- Viewer's perspective shadow -->
  <ellipse cx="400" cy="570" rx="50" ry="10" fill="#000" opacity="0.15"/>

  <!-- Vignette -->
  <rect x="0" y="0" width="800" height="600" fill="none" stroke="#0a0a12" stroke-width="70" stroke-opacity="0.4"/>
</svg>